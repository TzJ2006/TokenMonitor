confrontation:
  red_team:
    - id: ATK-001
      scenario: "CSS shows expanded before input shape → user sees panel but can't click"
      severity: high
    - id: ATK-002
      scenario: "Direction change: window moves but CSS hasn't flipped → 1-frame ball jump"
      severity: high
    - id: ATK-003
      scenario: "WM clamps 152px window to screen → ball can't reach far edge"
      severity: medium
    - id: ATK-004
      scenario: "Input shape stuck expanded after crash → invisible click interceptor"
      severity: medium
    - id: ATK-005
      scenario: "Rapid expand/collapse cycles queue input shape updates"
      severity: low
  blue_team:
    - attack: ATK-001
      verdict: mitigated
      mitigation: "Ordering protocol: expand shape FIRST, then CSS; collapse CSS FIRST, then shape"
    - attack: ATK-002
      verdict: mitigated
      mitigation: "Opacity mask: panel opacity=0 during direction change"
    - attack: ATK-003
      verdict: mitigated
      mitigation: "Accept 96px inset from opposite edge if WM clamps; ball reaches snap edge normally"
    - attack: ATK-004
      verdict: mitigated
      mitigation: "Log failures; frontend detects unexpected pointer events, triggers re-collapse"
    - attack: ATK-005
      verdict: defended
      mitigation: "Cairo region operations are µs-scale; GTK thread serializes them; no dedup needed"

