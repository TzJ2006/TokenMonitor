ecl_version: "1.0"
feature: "linux-floatball-geometry-fix"
status: implemented
created: 2026-04-04
updated: 2026-04-04

prompt_calibration:
  raw_input: |
    Fix Linux FloatBall architectural geometry instability: jumping, flickering,
    clipping caused by 4-layer geometry system mismatch.
  intent_decomposition:
    total_intents: 1
    total_tracks: 1
    tracks:
      - track_id: T1
        name: "Linux FloatBall geometry stability"
        priority: 1
        intents:
          - raw: "Fix jumping, flickering, clipping of FloatBall on Linux"
            type: architectural-fix

decisions:
  - id: DEC-001
    phase: 3
    date: 2026-04-04
    decision: "Fixed-size window + GDK input shape"
    rationale: |
      Eliminates resize (root cause of all 11 prior failures).
      GDK input_shape_combine_region is a safe Rust API in existing deps.
      Moderate engineering scope with full feature parity.
  - id: DEC-002
    phase: 5
    date: 2026-04-04
    decision: "Ordering protocol for input shape + CSS synchronization"
    rationale: |
      Atomic update impossible (different event loops). Instead:
      Expand: set expanded input shape FIRST, then CSS.
      Collapse: set CSS FIRST, then shrink input shape.
      This ensures transient state always has EXTRA clickable area (harmless)
      rather than MISSING clickable area (broken UX).
  - id: DEC-003
    phase: 5
    date: 2026-04-04
    decision: "Backend returns ball_offset_x in FloatBallPosition"
    rationale: |
      With fixed-size window, window.x ≠ ball screen x.
      Frontend needs ball offset within window for correct drag anchor.
  - id: DEC-004
    phase: 5
    date: 2026-04-04
    decision: "Direction change uses opacity masking"
    rationale: |
      Window move + CSS flex flip on different loops → 1-frame glitch.
      Panel opacity set to 0 during direction change, restored after both
      window move and CSS flip are confirmed.

requirements:
  - id: REQ-001
    text: "Linux FloatBall window created at fixed expanded size, never resized"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "Window size = expanded_width × expanded_height in LOGICAL pixels, scaled by monitor scale factor to physical"
      - "No set_size / geometry_hints calls after creation on Linux"
      - "set_position permitted; size changes prohibited"
      - "Position-only retry on create retained (up to 5 attempts with backoff)"
    decomposition:
      features: [FEAT-001]
    history:
      - phase: 5
        action: "Amended per FINDING-001 (HiDPI), FINDING-006 (move vs resize), FINDING-008 (create retry)"

  - id: REQ-002
    text: "Transparent regions click-through via GDK input shape"
    status: verified
    confidence: 0.90
    acceptance_criteria:
      - "Collapsed: 56×56 ball area accepts input; rest passes through"
      - "Expanded: full window area accepts input"
      - "Ordering: expand shape BEFORE CSS expand; collapse CSS BEFORE shrinking shape"
      - "Bounded latency: shape updates within one GTK main loop iteration"
      - "Failures logged; safety fallback on stuck expanded shape"
      - "Pointer capture released before input shape reduction"
    decomposition:
      features: [FEAT-002]
    history:
      - phase: 5
        action: "Amended per FINDING-002 (atomicity→ordering), FINDING-011 (pointer capture), FINDING-015 (logging)"

  - id: REQ-003
    text: "Expand/collapse triggers no native window resize"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "Linux expand/collapse = CSS state change + input shape update + optional window reposition"
      - "Direction change sequenced: move window → wait IPC → flip CSS direction"
      - "Panel opacity masked during direction change to prevent 1-frame glitch"
      - "Evaluate re-enabling CSS width transition (ghost artifacts were from resize, may be safe now)"
    decomposition:
      features: [FEAT-003, FEAT-004]
    history:
      - phase: 5
        action: "Amended per FINDING-004 (direction race), FINDING-009 (CSS transition)"

  - id: REQ-004
    text: "Drag works correctly with fixed-size window"
    status: verified
    confidence: 0.90
    acceptance_criteria:
      - "Drag moves full 152×56 window; ball follows mouse at correct offset"
      - "Backend returns ball_offset_x in FloatBallPosition for frontend drag anchor"
      - "Clamping ensures BALL stays within screen; transparent area may extend off-screen"
      - "If WM clamps full window to screen, accept ball stopping ~96px from opposite edge"
    decomposition:
      features: [FEAT-005]
    history:
      - phase: 5
        action: "Amended per FINDING-005 (offset ambiguity), FINDING-007 (WM clamping)"

  - id: REQ-005
    text: "Edge snap works on Linux with fixed-size window"
    status: verified
    confidence: 0.85
    acceptance_criteria:
      - "Ball snaps to nearest screen edge within snap threshold"
      - "Window positioned so ball is at edge, panel space toward center"
      - "Expand direction auto-chosen based on snap edge"
      - "cfg gates on choose_float_ball_anchor and SNAP_THRESHOLD_PX removed for Linux"
    decomposition:
      features: [FEAT-006]
    history:
      - phase: 5
        action: "Amended per FINDING-014 (cfg gates)"

  - id: REQ-006
    text: "Linux resize/probe/corrective code removed and simplified"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "spawn_linux_rect_probe removed (no resize to verify)"
      - "set_gtk_float_ball_size removed (no resize path)"
      - "Create position retry retained (position-only, no size correction)"
      - "apply_float_ball_window_rect Linux path = position-only set_position()"
    decomposition:
      features: [FEAT-007]

  - id: REQ-007
    text: "macOS and Windows behavior identical; tests updated appropriately"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "No changes to macOS/Windows code paths"
      - "macOS/Windows test assertions unchanged"
      - "Linux test assertions updated to reflect fixed-size geometry"
      - "All tests pass on all platforms"
    decomposition:
      features: [FEAT-008]
    history:
      - phase: 5
        action: "Amended per FINDING-010 (test ambiguity)"

  - id: REQ-008
    text: "lockViewportScrolling handles initial WebKitGTK layout timing"
    status: verified
    confidence: 0.85
    source: adversarial-phase-5
    acceptance_criteria:
      - "lockViewportScrolling guards against zero/implausible dimensions"
      - "Defers first call by one RAF on Linux to ensure WebKitGTK has finished layout"
    decomposition:
      features: [FEAT-009]
    history:
      - phase: 5
        action: "New requirement from FINDING-012 (viewport lock timing)"

