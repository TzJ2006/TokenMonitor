modules:
  - id: MOD-001
    name: "create_float_ball: expanded dimensions on Linux"
    parent: FEAT-001
    file_path: "src-tauri/src/commands/float_ball.rs"
    description: |
      On Linux, create window at expanded_width × expanded_height (logical × scale).
      Initial position: ball at bottom-right of screen, window extends toward center.
      Example: ball at screen right → expand_direction=Left → window.x = ball.x - 96.

  - id: MOD-002
    name: "Set initial GDK input shape (collapsed region)"
    parent: FEAT-001
    file_path: "src-tauri/src/commands/float_ball.rs"
    description: |
      After window shown, call update_linux_input_shape with collapsed=true.
      Input region = 56×56 at ball offset within window.

  - id: MOD-003
    name: "New: update_linux_input_shape function"
    parent: FEAT-002
    file_path: "src-tauri/src/commands/float_ball.rs"
    description: |
      fn update_linux_input_shape(window, ball_offset_x, expanded, sizes)
      Uses with_webview → gtk::Window → gdk::Window.
      Creates cairo::Region::create_rectangle for active area.
      Calls gdk_window.input_shape_combine_region(&region, 0, 0).
      Collapsed: region = ball_size × ball_size at (ball_offset_x, 0).
      Expanded: region = expanded_width × expanded_height at (0, 0).
      Logs success/failure. All coordinates in LOGICAL pixels.

  - id: MOD-004
    name: "Call input shape on state transitions"
    parent: FEAT-002
    file_path: "src-tauri/src/commands/float_ball.rs"
    description: |
      Hook into: create (after show), expand (before CSS notify), collapse
      (after CSS notify), direction change (after window move), snap (after
      position set). Each recalculates correct ball_offset_x.

  - id: MOD-005
    name: "Frontend setExpanded: no resize IPC on Linux"
    parent: FEAT-003
    file_path: "src/lib/components/FloatBall.svelte"
    description: |
      On Linux expand: call backend to update input shape + direction → set CSS expanded.
      On Linux collapse: set CSS collapsed → wait tick → call backend to shrink input shape.
      No blur guard needed (window doesn't resize). Remove nativeExpanded distinction.

  - id: MOD-006
    name: "Backend set_float_ball_expanded: Linux no-resize path"
    parent: FEAT-003
    file_path: "src-tauri/src/commands/float_ball.rs"
    description: |
      Linux: compute expand direction, optionally reposition window (if direction
      changed), update input shape. No resize calls. Update state.

  - id: MOD-007
    name: "CSS layout for fixed-size window"
    parent: FEAT-003
    file_path: "src/lib/components/FloatBall.svelte"
    description: |
      .shell on Linux always fills 152×56 window. Collapsed: ball renders at
      one end via flex-direction. Expanded: full capsule fills window.
      Evaluate re-enabling width transition (resize was the ghost cause).

  - id: MOD-008
    name: "Direction change: reposition window + opacity mask"
    parent: FEAT-004
    file_path: "src-tauri/src/commands/float_ball.rs"
    description: |
      When direction flips: (1) set panel opacity=0 via frontend event,
      (2) move window by ±(expanded_width - ball_size), (3) update input shape,
      (4) notify frontend to flip CSS + restore opacity.

  - id: MOD-009
    name: "Frontend direction change: opacity mask + CSS flip"
    parent: FEAT-004
    file_path: "src/lib/components/FloatBall.svelte"
    description: |
      Listen for direction-change events. On pre-change: opacity=0.
      On post-change: update data-direction, opacity=1.

  - id: MOD-010
    name: "move_float_ball_to: ball-centric clamping"
    parent: FEAT-005
    file_path: "src-tauri/src/commands/float_ball.rs"
    description: |
      Clamping ensures BALL portion within screen. Window may extend off-screen
      on the panel side (invisible + click-through). Compute window.x from
      ball.x using expand_direction offset.

  - id: MOD-011
    name: "get_float_ball_position returns ball_offset_x"
    parent: FEAT-005
    file_path: "src-tauri/src/commands/float_ball.rs"
    description: |
      Add ball_offset_x field to FloatBallPosition. Frontend uses this
      to compute correct pointer-to-window drag anchor.

  - id: MOD-012
    name: "Enable snap on Linux + remove cfg gates"
    parent: FEAT-006
    file_path: "src-tauri/src/commands/float_ball.rs"
    description: |
      Remove early return in snap_float_ball for Linux.
      Remove #[cfg(not(target_os = "linux"))] on choose_float_ball_anchor
      and SNAP_THRESHOLD_PX. Snap computes ball target, derives window pos.

  - id: MOD-013
    name: "Post-snap direction + input shape update"
    parent: FEAT-006
    file_path: "src-tauri/src/commands/float_ball.rs"
    description: |
      After snap, recalculate expand_direction from new edge.
      If changed, reposition window and update input shape.

  - id: MOD-014
    name: "Remove spawn_linux_rect_probe"
    parent: FEAT-007
    file_path: "src-tauri/src/commands/float_ball.rs"
    description: "Delete function and all call sites."

  - id: MOD-015
    name: "Remove set_gtk_float_ball_size"
    parent: FEAT-007
    file_path: "src-tauri/src/commands/float_ball.rs"
    description: "Delete GTK geometry hints, scrollbar logic, move_resize, idle reapply."

  - id: MOD-016
    name: "Simplify create retries to position-only"
    parent: FEAT-007
    file_path: "src-tauri/src/commands/float_ball.rs"
    description: |
      Retain retry loop but only verify/correct position.
      Remove any size-verification logic from retries.

  - id: MOD-017
    name: "Simplify apply_float_ball_window_rect for Linux"
    parent: FEAT-007
    file_path: "src-tauri/src/commands/float_ball.rs"
    description: |
      Linux path = set_position() only. resize parameter ignored.
      No GTK interop needed for positioning (Tauri API sufficient).

  - id: MOD-018
    name: "Platform gate all changes"
    parent: FEAT-008
    file_path: "src-tauri/src/commands/float_ball.rs"
    description: |
      Rust: #[cfg(target_os = "linux")] for new code paths.
      Frontend: isLinux() checks for behavior differences.

  - id: MOD-019
    name: "lockViewportScrolling timing guard"
    parent: FEAT-009
    file_path: "src/float-ball.ts"
    description: |
      Guard against zero/implausible dimensions.
      On Linux, defer first call by one RAF to ensure WebKitGTK layout pass.

