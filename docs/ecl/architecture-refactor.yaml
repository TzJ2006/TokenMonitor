    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "CodexJsonlEntry, CodexRawUsage structs moved"
      - "All codex_* free functions moved (~L339-953)"
      - "Diff utilities (extract_diff_paths, split_patch_by_file) moved with codex code"
      - "codex_parser.rs imports shared types from super::parser"
      - "read_codex_entries/read_codex_entries_with_debug become pub entry points in codex_parser.rs"
      - "UsageParser::load_codex_entries_with_debug stays in parser.rs as thin wrapper"
      - "cargo test passes, cargo clippy -- -D warnings clean"
    decomposition:
