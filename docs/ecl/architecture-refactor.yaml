      - "Wires resize, focus, blur, error, visibility, color-scheme listeners"
      - "Returns cleanup function for onMount teardown"
      - "Callbacks interface typed: { onResize, onFocus, onBlur, onError, onVisibilityChange, onColorSchemeChange }"
      - "App.svelte onMount reduces by ~60 lines"
      - "svelte-check passes"
