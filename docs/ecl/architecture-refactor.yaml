      - "cursor_parser.rs imports ParsedEntry, ProviderReadDebug, SessionParseResult, glob_jsonl_files, modified_since, path_to_string, push_sample_path from super::parser"
      - "UsageParser::load_cursor_entries_with_debug stays in parser.rs as thin wrapper calling cursor_parser free functions"
      - "commands/config.rs imports updated from usage::parser to usage::cursor_parser (~12 occurrences)"
      - "rate_limits/cursor.rs import updated for read_cursor_ide_access_token"
      - "lib.rs import updated for prime_ide_access_token"
      - "cargo test passes, cargo clippy -- -D warnings clean"
    decomposition:
