ecl_version: "1.0"
feature: "architecture-refactor"
status: phase-6-complete
created: 2026-04-26
updated: 2026-04-26

prompt_calibration:
  raw_input: "请你规划重构 (based on repo-audit findings F-001, F-003, F-004, F-012, F-013)"
  intent_decomposition:
    total_intents: 5
    total_tracks: 4
    tracks:
      - track_id: T1
        name: "parser.rs provider split"
        priority: 1
      - track_id: T2
        name: "FloatBall.svelte decomposition"
        priority: 2
      - track_id: T3
        name: "App.svelte event listener extraction"
        priority: 3
      - track_id: T4
        name: "Rust DiskCache abstraction"
        priority: 4

decisions:
  - id: DEC-001
    date: 2026-04-26
    decision: "T1: Direct import path changes, no re-exports from parser.rs"
    rationale: "Cleaner dependency graph; re-exports add an indirection layer"
  - id: DEC-002
    date: 2026-04-26
    decision: "T2: Extract to .ts modules, not sub-components"
    rationale: "Drag/layout/expand are tightly coupled via shared state"
  - id: DEC-003
    date: 2026-04-26
    decision: "T3: Only extract event listener wiring, skip handler extraction"
    rationale: "All handlers depend on reactive $state. Even loadInitialData/enableRateLimits capture closure state — injection overhead exceeds readability gain (Phase 5 Finding 8)"
  - id: DEC-004
    date: 2026-04-26
    decision: "T4: DiskCache<T> only — disk read/write + TTL check. No fetch abstraction"
    rationale: "litellm multi-source merge and exchange_rates global static make fetch logic too divergent to unify (Phase 5 Finding 5)"
  - id: DEC-005
    date: 2026-04-26
    decision: "UsageParser methods stay in parser.rs as thin wrappers"
    rationale: "They are &self methods on UsageParser which is defined in parser.rs. Cannot move to separate files. (Phase 5 Finding 2)"
  - id: DEC-006
    date: 2026-04-26
    decision: "Rename CodexParseResult → SessionParseResult, keep in parser.rs"
    rationale: "Used by both Cursor and Codex — provider modules should not depend on each other (Phase 5 Finding 3)"
  - id: DEC-007
    date: 2026-04-26
    decision: "T2 scope narrowed: only extract pure state transitions and computations"
    rationale: "Async IPC + Svelte $state mutations must stay in .svelte. Extracted modules return command objects (Phase 5 Finding 4)"
  - id: DEC-008
    date: 2026-04-26
    decision: "Test partitioning: unit tests of free functions move, UsageParser integration tests stay"
    rationale: "Phase 5 Finding 7 — cross-provider integration tests exercise UsageParser methods"

adversarial_findings:
  phase: 5
  total_findings: 10
  findings:
    - id: AF-001
      severity: critical
      target: REQ-001
      description: "Cursor statics create cross-subsystem dependency with rate_limits/cursor.rs"
      resolution: "Move all Cursor code (including statics) to cursor_parser.rs. rate_limits/cursor.rs changes import path — no circularity."
      status: resolved
    - id: AF-002
      severity: critical
      target: [REQ-001, REQ-002]
      description: "UsageParser &self methods cannot move to separate files"
      resolution: "Keep as thin wrappers in parser.rs. Free functions in new modules receive data as parameters."
      status: resolved
    - id: AF-003
      severity: high
      target: [REQ-001, REQ-002]
      description: "CodexParseResult type alias shared between Cursor and Codex"
      resolution: "Rename to SessionParseResult, keep in parser.rs as shared type"
      status: resolved
    - id: AF-004
      severity: high
      target: REQ-005
      description: "Drag state machine extraction breaks Svelte 5 reactivity"
      resolution: "Narrow scope: extract pure logic only, return command objects. Keep $state mutations in .svelte"
      status: resolved
    - id: AF-005
      severity: high
      target: REQ-009
      description: "CachedFetch<T> cannot unify divergent caching semantics"
      resolution: "Narrow to DiskCache<T> (disk ops + TTL only). Each module owns its own fetch logic"
      status: resolved
    - id: AF-006
      severity: medium
      target: REQ-003
      description: "Plan misses extract_diff_paths/split_patch_by_file duplication"
      resolution: "Diff utilities stay in parser.rs as pub(crate), move with codex code if exclusively used by codex"
      status: resolved
    - id: AF-007
      severity: medium
      target: REQ-004
      description: "Cross-provider integration tests have no partitioning rule"
      resolution: "Rule: free function unit tests move; UsageParser integration tests stay in parser.rs"
      status: resolved
    - id: AF-008
      severity: medium
      target: [REQ-007, REQ-008]
      description: "loadInitialData/enableRateLimits depend on closure state and $state"
      resolution: "Drop REQ-007 entirely. Only REQ-008 (event listener wiring) survives"
      status: resolved
    - id: AF-009
      severity: medium
      target: REQ-001
      description: "SQL interpolation in read_cursor_state_value_from_sqlite3"
      resolution: "Add debug_assert guard as improvement item, not a blocker"
      status: noted
    - id: AF-010
      severity: low
      target: REQ-006
      description: "Move queue RAF lifecycle and testing underspecified"
      resolution: "Specify RAF injection deps and 3 unit tests in acceptance criteria"
      status: resolved

