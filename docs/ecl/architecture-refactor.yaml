      - "debug_compare stays in parser.rs (cross-provider comparison)"
      - "Shared test helpers (write_file) stay in parser.rs or become pub(crate)"
      - "Total test count unchanged: cargo test passes with same count"
    decomposition:
      features: [FEAT-006]

  # ── T2: FloatBall decomposition ──
  - id: REQ-005
    track: T2
    text: "FloatBall pure drag logic extracted to TypeScript module"
    status: verified
    confidence: 0.85
    acceptance_criteria:
      - "floatBallDragMachine.ts contains: pointer classification, drag threshold detection, drag coordinate computation"
      - "No Svelte imports, no invoke() calls, no $state access in extracted module"
      - "Returns typed command objects (InitDragCommand, MoveDragCommand, EndDragCommand)"
      - "FloatBall.svelte onPointer* handlers call drag machine, then apply returned commands to $state and invoke()"
      - "svelte-check passes"
    decomposition:
      features: [FEAT-007]

  - id: REQ-006
    track: T2
    text: "FloatBall move queue extracted to TypeScript module"
    status: verified
    confidence: 0.85
    acceptance_criteria:
      - "floatBallMoveQueue.ts contains: queue coalescing, RAF-based flush scheduling, in-flight tracking"
      - "Accepts MoveQueueDeps interface: { requestAnimationFrame, cancelAnimationFrame, sendMove }"
      - "No direct window.* access in module (injected via deps)"
      - "At least 3 unit tests: (1) coalesce multiple queued moves, (2) in-flight blocks concurrent dispatch, (3) cancel cleans up RAF"
      - "svelte-check passes"
    decomposition:
      features: [FEAT-008]

  # ── T3: App.svelte event listener extraction ──
  - id: REQ-007
    track: T3
    text: "DROPPED — loadInitialData/enableRateLimits extraction"
    status: invalidated
    confidence: 0
    reason: "Phase 5 Finding 8: closure-captured mutable state + $state deps make injection overhead exceed benefit"

  - id: REQ-008
    track: T3
