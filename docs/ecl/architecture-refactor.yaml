  # ── T4: DiskCache ──
  - id: REQ-009
    track: T4
    text: "Generic DiskCache<T> helper for TTL-based disk caching"
    status: verified
    confidence: 0.85
    acceptance_criteria:
      - "usage/disk_cache.rs with DiskCache<T: Serialize + DeserializeOwned>"
      - "Methods: should_refresh(dir) -> bool, load(dir) -> Option<T>, save(dir, data) -> Result"
      - "Configurable: filename, ttl_secs, optional version check"
      - "litellm.rs uses DiskCache for read/write, keeps its own multi-source fetch logic"
      - "exchange_rates.rs uses DiskCache for read/write, keeps its own fetch + global static"
      - "At least 4 unit tests: TTL expired, TTL fresh, corrupt cache, version mismatch"
      - "cargo test passes, cargo clippy clean"
    decomposition:
      features: [FEAT-011]

