ecl_version: "1.0"
feature: "single-instance-guard"
status: completed
created: 2026-06-02
updated: 2026-06-02

prompt_calibration:
  raw_input: |
    增加一个新功能，我需要在每次运行前确认是否之前已有tokenmonitor正在运行，
    如果有的话给出一个弹窗，问是否需要退出之前运行中的tokenmonitor，还有就是检查
    端口占用，检查是否占用，如果存在这种情况，在打开的时候检测，并且弹出弹窗询问
    是否要释放端口。
  intent_decomposition:
    total_intents: 2
    total_tracks: 1
    tracks:
      - track_id: T1
        name: "Single-instance guard with quit-old + foreign-port release"
        priority: 1
        intents:
          - raw: "启动前检测已有实例，弹窗问是否退出旧实例并以新实例继续"
            type: feature
          - raw: "检测端口占用，被占用时弹窗询问是否释放端口"
            type: feature
  tracks:
    T1:
      calibrated_scenario: |
        TokenMonitor 当前没有任何单实例机制，运行时也不监听任何端口（生产构建已
        确认；localhost:1420 仅 dev 模式）。重复启动会出现两个托盘图标 / 行为异常。
        用一个固定回环锁端口（127.0.0.1:53217）做单实例锁，把两个需求统一：锁端口被
        "自己人"占用 = 已有实例（弹窗退旧留新）；被"陌生进程"占用 = 端口冲突（弹窗
        结束该进程释放）。决策发生在 tauri::Builder 之前——被拒绝的新实例不创建任何
        托盘/窗口就退出。全平台（macOS/Windows/Linux）。
      intent_dimensions:
        task: { status: present, value: "Detect running instance + foreign port holder at launch; native confirm dialogs; quit-old or kill-foreign then take over" }
        input: { status: enriched, value: "TcpListener bind result on 127.0.0.1:LOCK_PORT + PROBE reply over loopback" }
        output: { status: enriched, value: "Continue (own the lock) or process exit; old instance receives QUIT/FOCUS over socket" }
        constraints: { status: validated, value: "run() is sync (no tokio at startup); loopback-only bind; dialogs must not need Tauri event loop" }
        context: { status: enriched, value: "No single-instance plugin exists; tauri-plugin-dialog present but unsafe pre-event-loop; windows crate + objc2 present" }
        success_criteria: { status: resolved, value: "Double-launch shows dialog; confirm->old quits & new runs; decline->new exits; foreign port -> name+kill prompt" }

decisions:
  - id: DEC-001
    date: 2026-06-02
    decision: "Use a fixed loopback lock port (127.0.0.1:53217) as the single-instance lock; one mechanism serves both requirements"
    rationale: |
      The app has no port at runtime, so 'port occupation' had no concrete meaning.
      A dedicated loopback lock port makes it concrete AND doubles as the
      instance-detection primitive: bind success = sole instance; bind fail +
      our PROBE magic = own instance (REQ-1); bind fail + foreign/garbled =
      foreign process (REQ-2). 53217 is in the dynamic/ephemeral range and not a
      known service port; overridable via TM_LOCK_PORT.
  - id: DEC-002
    date: 2026-06-02
    decision: "Run the bind/probe/dialog/decision synchronously at the TOP of run(), before tauri::Builder"
    rationale: |
      run() is synchronous and Tauri owns the async runtime (no #[tokio::main]),
      so the startup path must be blocking std code (std::net, std::process,
      thread::sleep). Doing it before Builder means a declined new instance
      returns from run() and NEVER creates a tray icon or window — the whole
      point of "the new instance exits cleanly".
  - id: DEC-003
    date: 2026-06-02
    decision: "Native per-OS dialogs (MessageBoxW / osascript / zenity|kdialog), NOT tauri-plugin-dialog"
    rationale: |
      The Req-1/Req-2 prompts may run before Tauri's event loop exists (a declined
      instance never starts it). tauri-plugin-dialog's blocking_show needs a
      pumping event loop. MessageBoxW spins its own modal loop; osascript is a
      separate process (avoids the uninitialized-NSApplication hang that NSAlert
      would hit pre-Builder); zenity/kdialog are subprocesses. Linux falls back to
      log+decline when neither exists (never gtk_init ourselves — conflicts with tao).
  - id: DEC-004
    date: 2026-06-02
    decision: "Owner instance keeps the TcpListener in a module OnceLock; accept loop spawned in setup() via try_clone()"
    rationale: |
      The AppHandle (needed to app.exit(0) / show window) does not exist until
      setup() runs. Acquire the lock in run(), stash the listener in
      OnceLock<TcpListener>, then in setup() try_clone() it onto a dedicated
      std::thread accept loop. The OnceLock retains a handle so the socket stays
      bound for the process lifetime. FOCUS/show dispatches to the main thread via
      app.run_on_main_thread (GTK/AppKit are main-thread-only).

requirements:
  - id: REQ-001
    text: "On launch, detect an already-running TokenMonitor and prompt to quit it; confirm = quit old & continue, decline = new exits"
    status: implemented
    confidence: 0.9
    priority: must
    acceptance_criteria:
      - text: "Second launch shows a native confirm dialog identifying that an instance is already running"
        kind: soft
      - text: "Confirm sends QUIT over the lock port; old instance app.exit(0)s; new instance rebinds within 5s and continues"
        kind: hard
      - text: "Decline sends best-effort FOCUS (old window comes forward) and the new instance exits(0) without creating a tray/window"
        kind: hard
      - text: "Own-instance identity confirmed by a PROBE reply beginning with the TOKENMONITOR magic token"
        kind: hard
  - id: REQ-002
    text: "If the lock port is held by a foreign (non-TokenMonitor) process, prompt to free it (terminate that process)"
    status: implemented
    confidence: 0.85
    priority: must
    acceptance_criteria:
      - text: "Foreign occupation (no/garbled PROBE reply or connection refused) triggers a dialog naming the PID (and name when resolvable)"
        kind: soft
      - text: "Confirm kills the PID, then rebinds and continues; failure shows an error and exits"
        kind: hard
      - text: "Decline exits(0). find_port_holder=None still shows the dialog (unknown PID) and never hangs silently"
        kind: hard
  - id: REQ-003
    text: "Feature is cross-platform (macOS / Windows / Linux) and does not regress normal single-launch startup"
    status: implemented
    confidence: 0.9
    priority: must
    acceptance_criteria:
      - text: "Sole-instance launch binds and proceeds unchanged (tray + window behavior identical to before)"
        kind: hard
      - text: "Bind is loopback-only (127.0.0.1) so no firewall prompt / no LAN exposure"
        kind: hard
      - text: "TM_DISABLE_SINGLE_INSTANCE=1 bypasses the whole guard (dev/CI/test escape hatch)"
        kind: hard

feature_guard:
  generated: "2026-06-02"
  guards:
    - id: GUARD-001
      feature: "Single-instance guard + foreign-port release"
      description: "Loopback lock-port single-instance with native pre-init dialogs and quit-old/kill-foreign take-over"
      key_files:
        - "src-tauri/src/single_instance/mod.rs"
        - "src-tauri/src/single_instance/protocol.rs"
        - "src-tauri/src/single_instance/dialog.rs"
        - "src-tauri/src/single_instance/port.rs"
        - "src-tauri/src/lib.rs"
      invariants:
        - "Lock socket binds 127.0.0.1 ONLY, never 0.0.0.0/:: (firewall + LAN-exposure invariant)"
        - "acquire_or_exit() runs before tauri::Builder; the decline/exit path returns from run() so no tray/window is created"
        - "Startup path uses blocking std I/O only (no tokio) — run() is synchronous"
        - "Own-instance identity requires a PROBE reply starting with the TOKENMONITOR magic token; anything else = foreign"
        - "TM_DISABLE_SINGLE_INSTANCE bypasses the entire guard (acquire AND accept loop)"
        - "QUIT handler replies OK and flushes BEFORE app.exit(0); FOCUS/show is dispatched via run_on_main_thread"
      verification:
        # On Windows scope to --lib with TM_EMBED_TEST_MANIFEST=1 (bin target hits 0xC0000139).
        command: "cd src-tauri && cargo test single_instance"
        expected: "protocol parse/format/decide tests pass"
      status: active

confrontation:
  red_team:
    - id: ATK-001
      scenario: "Binding a port triggers a firewall allow/deny prompt on first run"
      severity: medium
    - id: ATK-002
      scenario: "An unrelated app permanently owns the lock port and never speaks our protocol"
      severity: medium
    - id: ATK-003
      scenario: "Rapid double-launch: two new instances both fail to bind and both confirm QUIT"
      severity: low
    - id: ATK-004
      scenario: "macOS NSAlert pre-Builder hangs because NSApplication isn't initialized"
      severity: high
    - id: ATK-005
      scenario: "New instance dies after sending QUIT but before rebind, leaving nobody running"
      severity: low
    - id: ATK-006
      scenario: "Showing a window from the accept thread crashes on Linux/macOS (UI not main-thread)"
      severity: high
    - id: ATK-007
      scenario: "Dev mode (npm run tauri dev) double-instances or hot-reload restarts block on the lock"
      severity: low
  blue_team:
    - attack: ATK-001
      verdict: defended
      mitigation: "Bind 127.0.0.1 only; loopback listeners do not trigger Windows Defender Firewall prompts."
    - attack: ATK-002
      verdict: mitigated
      mitigation: "Foreign branch names the PID and offers to free it; decline exits. TM_LOCK_PORT lets a colliding env pick another port without rebuild."
    - attack: ATK-003
      verdict: accepted
      mitigation: "poll_rebind yields exactly one winner; losers time out (5s) -> error -> exit. Lock is the single source of truth, no corruption."
    - attack: ATK-004
      verdict: defended
      mitigation: "Use osascript (separate process w/ own loop) instead of NSAlert; spawn-failure falls back to decline."
    - attack: ATK-005
      verdict: accepted
      mitigation: "Old instance honored QUIT and exited -> port free -> next launch binds cleanly as sole instance (self-healing)."
    - attack: ATK-006
      verdict: defended
      mitigation: "FOCUS/show dispatched via app.run_on_main_thread; accept thread only does socket I/O + app.exit(0) (thread-safe)."
    - attack: ATK-007
      verdict: defended
      mitigation: "TM_DISABLE_SINGLE_INSTANCE=1 bypasses the guard for dev/CI/testing."

risk_register:
  - risk: "macOS 文件已损坏 (Gatekeeper quarantine) is unrelated and NOT fixed by this feature"
    severity: low
    mitigation: "Documented for the user: fix via xattr -cr or proper signing/notarization. The prior 'port occupied' diagnosis was incorrect."
  - risk: "Killing a foreign process is destructive"
    severity: medium
    mitigation: "Only on explicit user confirmation; dialog names the PID. SIGTERM before SIGKILL on unix; taskkill /F on Windows."

implementation_order:
  - step: 1
    description: "single_instance/protocol.rs: pure parse/format + decide() + LOCK_PORT/TM_LOCK_PORT, full unit tests"
  - step: 2
    description: "single_instance/port.rs (find_port_holder/kill_pid) + single_instance/dialog.rs (confirm_*/show_error), #[cfg] per OS"
  - step: 3
    description: "single_instance/mod.rs: acquire_or_exit state machine, LOCK_LISTENER OnceLock, spawn_accept_loop, try_bind_lock/poll_rebind/probe_holder/send_line"
  - step: 4
    description: "lib.rs wiring (run()/setup/show_main_window extraction) + Cargo.toml Win32_NetworkManagement_IpHelper feature"
  - step: 5
    description: "cargo fmt + clippy -D warnings + cargo test --lib (TM_EMBED_TEST_MANIFEST=1 on Windows); manual double-launch QA"
