# ============================================================
# CONFRONTATION RESULTS
# ============================================================
confrontation:
  removed_items: 5
  removed_reasons:
    - "T2-3 clone: Rust ownership requires it"
    - "T3-3 normalizer factory: existing architecture sufficient"
    - "T3-4 bootstrap spread: readability regression"
    - "T3-1 deviceColor cache: negligible perf gain"
    - "T3-7 rateLimits dedup: shared logic already extracted"
  key_mitigations:
    - "T2-1: Must use ordered slice, not HashMap. Tests mandatory BEFORE refactor."
    - "T1-2: Extract pure functions only. No $state in extracted modules."
    - "T3-2: Keep three-tier color structure. Add types per tier, do NOT merge."
  surviving_risks:
    - risk: "Settings.svelte decomposition may break two-way binding on settings store"
      severity: medium
      mitigation: "Each sub-component receives settings as props + emits update events"
    - risk: "App.svelte extraction may miss implicit $effect dependencies"
      severity: medium
      mitigation: "Run full test suite after each extraction step"

# ============================================================
# VERIFICATION GATES
# ============================================================
verification:
  after_each_feature:
    frontend: "npm test -- --run"
    rust: "cd src-tauri && cargo clippy -- -D warnings && cargo test"
    typecheck: "npx svelte-check"
  after_all:
    - "npm test -- --run"
    - "cd src-tauri && cargo clippy -- -D warnings"
    - "cd src-tauri && cargo test"
    - "npx svelte-check"
