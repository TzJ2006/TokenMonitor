  raw_input: "请帮我优化 (following /optimize analysis)"
  intent_decomposition:
    total_intents: 1
    total_tracks: 3
    tracks:
      - track_id: T1
        name: "Large file decomposition"
        priority: 1
        relationship_to_other_tracks:
          T2: independent
          T3: related
      - track_id: T2
        name: "Rust backend simplification"
        priority: 2
        relationship_to_other_tracks:
          T1: independent
