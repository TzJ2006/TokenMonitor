      - FEAT-T1-1a  # SshHostsSettings.svelte
      - FEAT-T1-1b  # TrayConfigSettings.svelte
      - FEAT-T1-1c  # ThemeSettings.svelte
      - FEAT-T1-1d  # HiddenModelsSettings.svelte
      - FEAT-T1-1e  # HeaderTabsSettings.svelte

  phase_3_sequential:
