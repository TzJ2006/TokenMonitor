          T2: independent

# ============================================================
# REQUIREMENTS (post Phase 5 adversarial review)
# ============================================================
requirements:
  # --- T1: Large File Decomposition ---
  - id: REQ-T1-1
    text: "Split Settings.svelte into focused sub-components"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "Settings.svelte < 200 lines (coordinator only)"
      - "Each sub-component < 400 lines"
      - "All 202 frontend tests pass"
      - "No visual UI changes"
    decomposition:
      features: [FEAT-T1-1a, FEAT-T1-1b, FEAT-T1-1c, FEAT-T1-1d, FEAT-T1-1e]

  - id: REQ-T1-2
    text: "Extract pure computation logic from App.svelte into utility modules"
    status: verified
    confidence: 0.85
    note: "Revised from original: keep Svelte reactive state in component, extract only pure functions"
    acceptance_criteria:
      - "App.svelte < 800 lines"
      - "Extracted modules are stateless pure functions"
      - "All 202 frontend tests pass"
      - "No visual UI changes"
    decomposition:
      features: [FEAT-T1-2a, FEAT-T1-2b]

  - id: REQ-T1-3
    text: "Refactor Breakdown.svelte accordion to map-based approach"
    status: verified
    confidence: 0.90
    acceptance_criteria:
      - "Accordion toggle uses Record<scope, state> instead of if-else chains"
      - "Mutual exclusion logic is data-driven"
      - "All frontend tests pass"
    decomposition:
      features: [FEAT-T1-3]

  # --- T2: Rust Backend ---
  - id: REQ-T2-1
    text: "Convert models.rs normalize functions to ordered lookup table"
    status: verified
    confidence: 0.90
    note: "Must use ordered &[...] slice, NOT HashMap. Order-dependent contains() semantics must be preserved."
    acceptance_criteria:
      - "Normalize functions use CLAUDE_ALIASES/CODEX_ALIASES const slices"
      - "Tests cover every model variant including substring edge cases"
      - "cargo clippy passes"
    decomposition:
      features: [FEAT-T2-1a, FEAT-T2-1b]

  - id: REQ-T2-2
    text: "Eliminate duplicate calendar day parsing in calendar.rs"
    status: verified
    confidence: 0.95
    note: "Replace inline filter_map in fetch_for_provider with call to existing calendar_days_from_payload()"
    acceptance_criteria:
      - "Only one parsing implementation exists"
      - "Rust tests pass, cargo clippy clean"
    decomposition:
      features: [FEAT-T2-2]

  - id: REQ-T2-3
    text: "Clean up float_ball.rs: remove unused params + extract compute_scaled_sizes()"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "apply_float_ball_window_rect() has only window + rect params"
      - "compute_scaled_sizes(scale) replaces 4 duplicate constructions"
      - "cargo clippy passes, all call sites updated"
    decomposition:
      features: [FEAT-T2-3a, FEAT-T2-3b]

  # --- T3: Frontend Local ---
  - id: REQ-T3-1
    text: "Consolidate Chart.svelte magic numbers into DETAIL_CONFIG object"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "All 10 detail-panel constants in one frozen object"
      - "No standalone DETAIL_* consts remain"
      - "All frontend tests pass"
    decomposition:
      features: [FEAT-T3-1]

  - id: REQ-T3-2
    text: "Add typed ModelColorRule[] with explicit priority to format.ts"
    status: verified
    confidence: 0.85
    note: "Keep three-tier structure (exact/includes/prefix) but add types per tier. Do NOT merge into single array."
    acceptance_criteria:
      - "Each tier has typed interface (PrefixRule, IncludesRule)"
      - "Order-dependent comment replaced by explicit type contract"
      - "All frontend tests pass"
    decomposition:
      features: [FEAT-T3-2]

  - id: REQ-T3-3
    text: "Improve float-ball.ts error handling"
    status: verified
    confidence: 0.90
    note: "Use trace-level logging, not debug. Add platform guard."
    acceptance_criteria:
      - "setBackgroundColor guarded by isWindows() check"
      - "Failure logged at trace level with platform context"
    decomposition:
      features: [FEAT-T3-3]

  # --- REMOVED items (with reasons from Phase 5) ---
  - id: REQ-REMOVED-1
    text: "Remove unnecessary clone() in config.rs line 164"
    status: invalidated
    reason: "Clone is required by Rust ownership: merged is both stored in cache and returned by value"

  - id: REQ-REMOVED-2
    text: "Create generic normalizer factory in settings.ts"
    status: invalidated
    reason: "Existing normalizer architecture is already well-factored; factory adds complexity without reducing code"

  - id: REQ-REMOVED-3
    text: "Simplify bootstrap.ts conditional array with spread+ternary"
    status: invalidated
    reason: "Spread+ternary is less readable than current if+push; file is only 74 lines"

  - id: REQ-REMOVED-4
    text: "Add memoization cache to deviceColor()"
    status: invalidated
    reason: "hashString is O(n) with n=5-20 chars; cache adds unbounded memory for negligible gain"

  - id: REQ-REMOVED-5
    text: "Deduplicate rateLimits.ts success/error handling"
    status: invalidated
    reason: "Shared logic already extracted into updateProviderMonitorState/scheduleProviderRetry; remaining code is branch-specific"

