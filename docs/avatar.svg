<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="128" height="128">
  <style>
    /* ── Theme ── */
    .disc { fill: rgba(0,0,0,0.85); }
    .eye-l, .eye-r-dot { fill: #F5F5F7; }
    .eye-r-wink { stroke: #F5F5F7; fill: none; }
    @media (prefers-color-scheme: dark) {
      .disc { fill: rgba(255,255,255,0.93); }
      .eye-l, .eye-r-dot { fill: #111113; }
      .eye-r-wink { stroke: #111113; }
    }

    /* ── Entrance: disc scales in ── */
    .wrap {
      transform-origin: 40px 40px;
      animation: wrapIn 0.45s cubic-bezier(0.34,1.56,0.64,1) 0.05s both,
                 alive 3s ease-in-out 0.5s infinite;
    }
    @keyframes wrapIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Idle drift ── */
    @keyframes alive {
      0%   { transform: translate(0,0) rotate(0deg); }
      18%  { transform: translate(1.2px,-3px) rotate(2deg); }
      40%  { transform: translate(-1.8px,-1px) rotate(-1.5deg); }
      58%  { transform: translate(0.8px,-3.5px) rotate(0.5deg); }
      75%  { transform: translate(-1px,-0.5px) rotate(-2.2deg); }
      90%  { transform: translate(0.5px,-1.8px) rotate(1.2deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }

    /* ── Eyes entrance ── */
    .eye-l {
      opacity: 0;
      animation: fadeIn 0.2s ease-out 0.25s both;
    }
    .eye-r-group {
      opacity: 0;
      animation: fadeIn 0.2s ease-out 0.30s both;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* ── Wink cycle: repeats every 3s after initial wink at 1s ── */
    .eye-r-dot {
      animation: winkDot 3s ease-in-out 1.0s infinite;
    }
    @keyframes winkDot {
      0%      { opacity: 1; }
      5%      { opacity: 0; }
      12%     { opacity: 0; }
      17%     { opacity: 1; }
      100%    { opacity: 1; }
    }

    .eye-r-wink {
      opacity: 0;
      animation: winkChevron 3s ease-in-out 1.0s infinite;
    }
    @keyframes winkChevron {
      0%      { opacity: 0; }
      5%      { opacity: 1; }
      12%     { opacity: 1; }
      17%     { opacity: 0; }
      100%    { opacity: 0; }
    }
  </style>

  <g class="wrap">
    <!-- Disc -->
    <circle class="disc" cx="40" cy="40" r="32" />

    <!-- Left eye -->
    <circle class="eye-l" cx="30" cy="33" r="5.5" />

    <!-- Right eye: dot + wink chevron -->
    <g class="eye-r-group">
      <circle class="eye-r-dot" cx="50" cy="33" r="5.5" />
      <path class="eye-r-wink" d="M53.5,29 L47.5,33 L53.5,37"
        stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>
</svg>
