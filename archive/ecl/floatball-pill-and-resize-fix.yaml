ecl_version: "1.0"
feature: "floatball-pill-shape-and-resize-timing"
status: phase-9-review
created: 2026-03-26
updated: 2026-03-26

prompt_calibration:
  raw_input: |
    1. 悬浮球做成胶囊形状（参考图），内容和颜色保持一致
    2. 主界面内容消失时，先保持窗口大小不变，等消失完再缩小
  intent_decomposition:
    total_intents: 2
    total_tracks: 2
    tracks:
      - track_id: T1
        name: "Float ball pill shape"
        priority: 1
        intents:
          - raw: "悬浮球做成胶囊形状，内容颜色不变"
            type: feature
        relationship_to_other_tracks:
          T2: independent
      - track_id: T2
        name: "Window resize timing fix"
        priority: 2
        intents:
          - raw: "内容消失时先不缩小窗口，等完全消失再缩小"
            type: bugfix
        relationship_to_other_tracks:
          T1: independent
  tracks:
    T1:
      calibrated_scenario: |
        Redesign the expanded float ball to a pill/capsule shape matching
        the reference image. Ball (circle) sits at one end of the pill,
        panel content fills the rest. Collapsed state remains a circle.
        Keep current dark theme colors and content (cost + utilization bars).
      intent_dimensions:
        task: { status: present, value: "Pill-shaped expanded float ball" }
        input: { status: present, value: "Reference image" }
        output: { status: present, value: "Pill-shaped FloatBall.svelte" }
        constraints: { status: present, value: "Keep content and colors unchanged" }
        context: { status: enriched, value: "Tauri v2 + Svelte 5, Windows GDI regions" }
        success_criteria: { status: resolved, value: "Expanded state is pill-shaped, collapsed is circle" }
    T2:
      calibrated_scenario: |
        Fix the chart detail panel hide transition so it fades opacity
        first without changing layout, then collapses layout after fade
        completes. This prevents the window from shrinking during the
        fade-out and keeps other content stationary.
      intent_dimensions:
        task: { status: present, value: "Fix shrink timing" }
        constraints: { status: present, value: "Other content must not shift during fade" }
        success_criteria: { status: resolved, value: "Window shrinks only after content fully disappears" }

requirements:
  - id: REQ-001
    text: "Expanded float ball uses pill/capsule shape"
    status: verified
    confidence: 0.95
    decomposition:
      features: [FEAT-001, FEAT-002, FEAT-003]
  - id: REQ-002
    text: "Collapsed float ball remains a circle"
    status: verified
    confidence: 1.0
  - id: REQ-003
    text: "Content and colors unchanged"
    status: verified
    confidence: 1.0
  - id: REQ-004
    text: "Window stays same size during content fade-out"
    status: verified
    confidence: 0.95
    decomposition:
      features: [FEAT-004]
  - id: REQ-005
    text: "Window shrinks only after content fully disappears"
    status: verified
    confidence: 0.95

features:
  - id: FEAT-001
    name: "FloatBall pill CSS"
    parent: REQ-001
    description: |
      Change .shell expanded state to pill shape with border-radius.
      Move background from .panel to .shell. Remove mask-image hack.
      Ball overlaps one end of the pill.
    complexity: medium
    dependencies: []
  - id: FEAT-002
    name: "Rust expanded dimensions"
    parent: REQ-001
    description: |
      Adjust EXPANDED_W and EXPANDED_H constants in float_ball.rs
      to match new pill proportions if needed.
    complexity: small
    dependencies: [FEAT-001]
  - id: FEAT-003
    name: "Windows GDI region update"
    parent: REQ-001
    description: |
      Update apply_float_ball_region() in platform/windows/window.rs
      if window dimensions change.
    complexity: small
    dependencies: [FEAT-002]
  - id: FEAT-004
    name: "CSS transition split for detail panel"
    parent: REQ-004
    description: |
      Split .detail CSS transitions: show animates max-height+opacity
      together; hide fades opacity first, then collapses max-height
      after a CSS transition-delay matching the opacity duration.
      Pure CSS fix, no JS changes needed.
    complexity: small
    dependencies: []

dependency_graph:
  FEAT-001: []
  FEAT-002: [FEAT-001]
  FEAT-003: [FEAT-002]
  FEAT-004: []
