ecl_version: "1.0"
feature: "multi-device-ui-design"
status: phase-10-implemented
created: 2026-03-29
updated: 2026-03-29
parent_ecl: "ssh-device-cost-breakdown.yaml"

# ══════════════════════════════════════════════════════════════════════════════
# PROMPT CALIBRATION
# ══════════════════════════════════════════════════════════════════════════════

prompt_calibration:
  raw_input: >
    设计多设备 (通过SSH连接) 的费用统计前端,
    按照之前讨论的3层渐进式UI设计实现 (P0-P3全部)。
  intent_decomposition:
    total_intents: 1
    total_tracks: 1
    tracks:
      - track_id: T1
        name: "Multi-device UI progressive design"
        priority: 1
        intents:
          - raw: "多设备SSH费用统计前端设计与实现"
            type: feature
  tracks:
    T1:
      calibrated_scenario: |
        在 TokenMonitor 340px 弹窗中实现 4 层渐进式多设备费用统计 UI：
        P0: 主界面 Devices 折叠区（Breakdown 下方）
        P1: 增强版 DevicesView（连接状态、同步时间、费用占比）
        P2: Chart 按设备堆叠模式（By Model / By Device 切换）
        P3: 单设备深入页（复用 Chart + Breakdown）
        后端 SSH 基础设施已就绪，需扩展数据模型和新增 IPC 命令。

# ══════════════════════════════════════════════════════════════════════════════
# VALIDATED DECISIONS
# ══════════════════════════════════════════════════════════════════════════════

decisions:
  - id: DEC-001
    decision: "实现范围: P0-P3 全部四层"
    date: 2026-03-29
    source: user-confirmed

  - id: DEC-002
    decision: "Devices 折叠区放在 Model Breakdown 下方"
    rationale: "与 subagent_stats 交互模式一致"
    date: 2026-03-29
    source: user-confirmed

  - id: DEC-003
    decision: "无 SSH 主机时完全隐藏 Devices 区域"
    rationale: "保持单机用户界面不变"
    date: 2026-03-29
    source: user-confirmed

  - id: DEC-004
    decision: "Chart 使用 By Model / By Device 模式切换"
    rationale: "两种视角不混合，避免视觉复杂"
    date: 2026-03-29
    source: user-confirmed

  - id: DEC-005
    decision: "单设备深入页可从 accordion 和 DevicesView 两处进入"
    rationale: "一致的交互体验"
    date: 2026-03-29
    source: user-confirmed

# ══════════════════════════════════════════════════════════════════════════════
# REQUIREMENTS
# ══════════════════════════════════════════════════════════════════════════════

requirements:
  # ── P0: Main View Devices Accordion ──
  - id: REQ-001
    text: "主界面 Breakdown 下方显示 Devices 折叠区"
    status: verified
    confidence: 0.95
    priority: P0
    acceptance_criteria:
      - "在 Breakdown 组件底部新增 'Devices' accordion section"
      - "仅当 ≥1 个 SSH 主机已配置并启用时显示"
      - "折叠状态：显示设备数和总费用 '▸ Devices (3)  $47.20'"
      - "展开状态：每个设备一行，显示名称 + 费用 + 比例条"
      - "本机标记 'This device'，排在第一位"
      - "点击设备行可进入单设备详情页 (P3)"
      - "展开/折叠触发窗口高度动画（同 subagent accordion）"
    decomposition:
      features: [FEAT-001, FEAT-002, FEAT-003]

  # ── P1: Enhanced DevicesView ──
  - id: REQ-002
    text: "增强 DevicesView 加入连接状态和操作控件"
    status: verified
    confidence: 0.90
    priority: P1
    acceptance_criteria:
      - "每个设备卡片显示连接状态指示器（绿/灰/黄/橙）"
      - "显示相对同步时间（'Synced 2m ago'）"
      - "显示费用百分比和比例条"
      - "本机设备标记 'This device'，始终排首位"
      - "底部操作栏：'Sync All' 按钮 + 'Settings' 链接"
      - "设备卡片可点击进入单设备详情页 (P3)"
    decomposition:
      features: [FEAT-004, FEAT-005, FEAT-006]

  # ── P2: Chart By Device Mode ──
  - id: REQ-003
    text: "Chart 支持 By Model / By Device 模式切换"
    status: verified
    confidence: 0.85
    priority: P2
    acceptance_criteria:
      - "Chart 上方新增 'By Model' / 'By Device' toggle"
      - "By Device 模式下 chart segments 按设备着色"
      - "设备颜色从 alias hash 确定性分配"
      - "仅在有多设备数据时显示 toggle（单机隐藏）"
      - "hover detail 面板适配设备名显示"
      - "与 bar/line 模式切换正交（2x2 组合）"
    decomposition:
      features: [FEAT-007, FEAT-008, FEAT-009]

  # ── P3: Single Device Detail View ──
  - id: REQ-004
    text: "单设备深入页复用现有 Chart + Breakdown"
    status: verified
    confidence: 0.85
    priority: P3
    acceptance_criteria:
      - "新 SingleDeviceView 组件，slide-in 导航模式"
      - "复用 Chart 组件（仅 By Model，无 By Device）"
      - "复用 Breakdown 组件（该设备的模型细分）"
      - "显示设备名、连接状态、总费用"
      - "响应主界面的 period/offset 变化"
      - "从 Devices accordion 和 DevicesView 均可进入"
      - "返回按钮回到来源视图"
    decomposition:
      features: [FEAT-010, FEAT-011, FEAT-012]

# ══════════════════════════════════════════════════════════════════════════════
# FEATURES
# ══════════════════════════════════════════════════════════════════════════════

features:
  # ── P0 Features ──
  - id: FEAT-001
    name: "Backend: UsagePayload 增加 device_breakdown"
    parent: REQ-001
    priority: P0
    complexity: medium
    modules: [MOD-001, MOD-002]
    dependencies: []
    description: |
      在 Rust UsagePayload 结构体中新增 device_breakdown 字段。
      当有已配置的 SSH 主机时，get_usage_data 同时构建设备维度汇总。
      复用现有 build_device_summary_from_parsed / build_device_summary_from_compact 逻辑。

  - id: FEAT-002
    name: "Frontend: Breakdown 组件新增 Devices accordion"
    parent: REQ-001
    priority: P0
    complexity: medium
    modules: [MOD-003]
    dependencies: [FEAT-001]
    description: |
      在 Breakdown.svelte 底部新增 Devices section（类似 Agents section）。
      接收 deviceBreakdown prop (DeviceSummary[] | null)。
      null 时完全不渲染。展开后显示设备行。

  - id: FEAT-003
    name: "Frontend: 设备颜色分配工具函数"
    parent: REQ-001
    priority: P0
    complexity: small
    modules: [MOD-004]
    dependencies: []
    description: |
      基于设备 alias 的确定性 hash 从预定义调色板中分配颜色。
      同一 alias 始终得到相同颜色。避免与 model 颜色混淆。

  # ── P1 Features ──
  - id: FEAT-004
    name: "Backend: DeviceSummary 扩展状态字段"
    parent: REQ-002
    priority: P1
    complexity: medium
    modules: [MOD-005]
    dependencies: [FEAT-001]
    description: |
      扩展 DeviceSummary: is_local, status, last_synced,
      error_message, cost_percentage。
      从 SshHostStatus + SshCacheManager 合并状态信息。

  - id: FEAT-005
    name: "Frontend: DevicesView 增强卡片"
    parent: REQ-002
    priority: P1
    complexity: medium
    modules: [MOD-006]
    dependencies: [FEAT-004]
    description: |
      重新设计设备卡片：连接状态指示器、相对同步时间、
      费用百分比、本机标记。增加 Sync All 和 Settings 按钮。

  - id: FEAT-006
    name: "Frontend: DevicesView 可点击导航"
    parent: REQ-002
    priority: P1
    complexity: small
    modules: [MOD-006]
    dependencies: [FEAT-005]
    description: |
      设备卡片可点击，触发 onDeviceSelect(device) 回调，
      由 App.svelte 处理导航到 SingleDeviceView。

  # ── P2 Features ──
  - id: FEAT-007
    name: "Backend: device_chart_buckets 字段"
    parent: REQ-003
    priority: P2
    complexity: medium
    modules: [MOD-007]
    dependencies: [FEAT-001]
    description: |
      在 UsagePayload 中新增 device_chart_buckets 字段。
      时间轴与 chart_buckets 相同，但 segments 按设备而非模型分段。
      仅在有多设备数据时填充。

  - id: FEAT-008
    name: "Frontend: Chart By Model / By Device toggle"
    parent: REQ-003
    priority: P2
    complexity: medium
    modules: [MOD-008]
    dependencies: [FEAT-007, FEAT-003]
    description: |
      Chart 组件新增 chartSegmentMode store: "model" | "device"。
      根据模式选择 chart_buckets 或 device_chart_buckets。
      toggle 仅在 device_chart_buckets 存在时显示。

  - id: FEAT-009
    name: "Frontend: Chart detail panel 适配设备模式"
    parent: REQ-003
    priority: P2
    complexity: small
    modules: [MOD-008]
    dependencies: [FEAT-008]
    description: |
      hover detail 面板在 By Device 模式下显示设备名和设备颜色，
      而非模型名和模型颜色。

  # ── P3 Features ──
  - id: FEAT-010
    name: "Backend: get_single_device_usage IPC"
    parent: REQ-004
    priority: P3
    complexity: medium
    modules: [MOD-009]
    dependencies: [FEAT-001]
    description: |
      新增 Tauri command: get_single_device_usage(device, period, offset)。
      返回 UsagePayload 结构，但只包含指定设备的数据。
      对 "Local" 设备过滤本机条目，对远程设备过滤缓存条目。

  - id: FEAT-011
    name: "Frontend: SingleDeviceView 组件"
    parent: REQ-004
    priority: P3
    complexity: medium
    modules: [MOD-010]
    dependencies: [FEAT-010, FEAT-003]
    description: |
      新建 SingleDeviceView.svelte。Header 显示设备名 + 状态。
      复用 Chart (仅 By Model) + Breakdown 组件。
      slide-in 导航，返回按钮。

  - id: FEAT-012
    name: "Frontend: App.svelte 导航状态管理"
    parent: REQ-004
    priority: P3
    complexity: small
    modules: [MOD-011]
    dependencies: [FEAT-011, FEAT-006]
    description: |
      App.svelte 新增 selectedDevice state。
      Devices accordion 和 DevicesView 的设备点击均设置 selectedDevice。
      渲染 SingleDeviceView 并传入设备名。返回时清空 selectedDevice。

