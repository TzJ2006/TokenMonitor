  - id: MOD-006
    name: "Svelte: Enhanced DevicesView"
    parent: FEAT-005
    file_path: "src/lib/components/DevicesView.svelte"
    functions:
      - "Status indicator (dot color mapping)"
      - "Relative time display (last_synced -> '2m ago')"
