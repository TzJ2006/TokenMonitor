# ══════════════════════════════════════════════════════════════════════════════
# DEPENDENCY GRAPH
# ══════════════════════════════════════════════════════════════════════════════

dependency_graph:
  # P0 — can start immediately
  FEAT-001: []                     # Backend: UsagePayload device_breakdown
  FEAT-003: []                     # Device color utility (independent)
  FEAT-002: [FEAT-001]             # Breakdown Devices section (needs backend data)

  # P1 — after P0
  FEAT-004: [FEAT-001]             # Backend: DeviceSummary extension
  FEAT-005: [FEAT-004]             # DevicesView enhanced cards
  FEAT-006: [FEAT-005]             # DevicesView clickable navigation

  # P2 — parallel with P1
  FEAT-007: [FEAT-001]             # Backend: device_chart_buckets
  FEAT-008: [FEAT-007, FEAT-003]   # Chart toggle
  FEAT-009: [FEAT-008]             # Chart detail panel adaptation

  # P3 — after P1 + P2
  FEAT-010: [FEAT-001]             # Backend: single device usage
  FEAT-011: [FEAT-010, FEAT-003]   # SingleDeviceView component
  FEAT-012: [FEAT-011, FEAT-006]   # App navigation state

# Implementation order (parallel tracks):
#   Track A: FEAT-001 → FEAT-002 → FEAT-004 → FEAT-005 → FEAT-006
#   Track B: FEAT-003 (independent, start immediately)
#   Track C: FEAT-007 → FEAT-008 → FEAT-009 (after FEAT-001)
#   Track D: FEAT-010 → FEAT-011 → FEAT-012 (after FEAT-001)

# ══════════════════════════════════════════════════════════════════════════════
# DATA FLOWS
# ══════════════════════════════════════════════════════════════════════════════

data_flows:
  FEAT-001:
    input: "Local ParsedEntry[] + Remote CompactUsageRecord[] per SSH host"
    transform: "Existing device summary builders + merge with SshHostStatus"
    store: "Populated in UsagePayload (in-memory, served via IPC)"
    output: "UsagePayload.device_breakdown → Svelte stores → Breakdown component"

  FEAT-007:
    input: "Same entries as FEAT-001, plus time bucketing logic"
    transform: "Group by time bucket, then by device within each bucket"
    store: "Populated in UsagePayload.device_chart_buckets"
    output: "Chart component when chartSegmentMode === 'device'"

  FEAT-010:
    input: "device alias + period + offset"
    transform: "Filter all entries to single device, run standard aggregation"
    store: "Returned as UsagePayload (same shape as main data)"
    output: "SingleDeviceView → Chart + Breakdown"

# ══════════════════════════════════════════════════════════════════════════════
# INTERFACE CONTRACTS
# ══════════════════════════════════════════════════════════════════════════════

interface_contracts:
  - caller: "App.svelte"
    callee: "Breakdown.svelte"
    contract: |
      New prop: deviceBreakdown: DeviceSummary[] | null
      New prop: onDeviceSelect: ((device: string) => void) | undefined
      Null means no device section rendered.

  - caller: "App.svelte"
    callee: "Chart.svelte"
    contract: |
      New prop: deviceBuckets: ChartBucket[] | null
      Null means no "By Device" toggle shown.

  - caller: "App.svelte"
    callee: "SingleDeviceView.svelte"
    contract: |
      Props: device: string, onBack: () => void
      Component fetches own data via IPC.

  - caller: "Rust get_usage_data"
    callee: "Frontend UsagePayload"
    contract: |
      New optional fields in JSON:
        device_breakdown: DeviceSummary[] | null
        device_chart_buckets: ChartBucket[] | null
      Frontend must handle both null (no SSH) and populated.

  - caller: "Rust get_single_device_usage"
    callee: "Frontend UsagePayload"
    contract: |
      New IPC command. Returns same UsagePayload shape.
      device_breakdown and device_chart_buckets always null
      (single device view doesn't need device dimension).

# ══════════════════════════════════════════════════════════════════════════════
# TYPE CHANGES (Frontend)
# ══════════════════════════════════════════════════════════════════════════════

type_changes:
  UsagePayload:
    add:
      - "device_breakdown: DeviceSummary[] | null"
      - "device_chart_buckets: ChartBucket[] | null"

  DeviceSummary:
    add:
      - "is_local: boolean"
      - "status: 'online' | 'offline' | 'syncing' | 'error'"
      - "last_synced: string | null"
      - "error_message: string | null"
      - "cost_percentage: number"

  ChartSegmentMode:
    new: "'model' | 'device'"

  new_store:
    chartSegmentMode: "writable<ChartSegmentMode>('model')"

# ══════════════════════════════════════════════════════════════════════════════
# PROBE ASSESSMENT
# ══════════════════════════════════════════════════════════════════════════════

probe_assessment:
  - item: FEAT-001
    risk_score: 5  # medium
    factors:
      technology_novelty: 0  # reusing existing device summary builders
      integration_complexity: 2  # wiring into get_usage_data flow
      performance_sensitivity: 2  # adds to every IPC call
      data_integrity_risk: 1  # read-only aggregation
      external_dependency: 0

  - item: FEAT-007
    risk_score: 6  # medium
    factors:
      technology_novelty: 1  # new bucketing dimension
      integration_complexity: 2
      performance_sensitivity: 2
      data_integrity_risk: 1
      external_dependency: 0

  - item: FEAT-008
    risk_score: 4  # medium-low
    factors:
      technology_novelty: 1
      integration_complexity: 2  # modifying existing Chart component
      performance_sensitivity: 1
      data_integrity_risk: 0
      external_dependency: 0

probes:
  - target: FEAT-001
    type: assumption
    question: "get_usage_data 在 commands.rs 中能否访问 SSH state (ssh_hosts + ssh_cache)？"
    method: code-inspection
    result: "Yes - AppState contains ssh_hosts and ssh_cache, accessible via State<AppState>"
    verdict: feasible

# ══════════════════════════════════════════════════════════════════════════════
# ADVERSARIAL FINDINGS (populated by Phase 5 critic)
# ══════════════════════════════════════════════════════════════════════════════

adversarial_findings:
  - id: FIND-001
    target: [FEAT-002, FEAT-008]
    dimension: scalability_blind_spots
    severity: medium
    description: "10+ SSH 设备时 accordion 过长，Chart segments 不可读"
    resolution: "Accordion 限显 top 5 + '+N more →'。Chart 限 top 5 + 'Other' 段"
    status: mitigated

  - id: FIND-002
    target: FEAT-001
    dimension: performance_sensitivity
    severity: high
    description: "device_breakdown 聚合可能阻塞 get_usage_data 响应"
    resolution: "仅读本地 SSH 缓存 (<1ms)，不触发远程连接。后台 sync loop 负责数据更新"
    status: defended

  - id: FIND-003
    target: FEAT-002
    dimension: missing_edges
    severity: medium
    description: "Subagents + Devices accordion 同时展开导致窗口高度超限"
    resolution: "Devices 和 Subagents accordion 互斥展开（展开一个自动折叠另一个）"
    status: mitigated
    new_requirement: "accordion 互斥约束"

  - id: FIND-004
    target: FEAT-012
    dimension: missing_edges
    severity: medium
    description: "SingleDeviceView 中切换 provider tab 导致状态混乱"
    resolution: "进入 SingleDeviceView 时隐藏 provider/period tabs（全屏 modal 模式）"
    status: mitigated

  - id: FIND-005
    target: FEAT-004
    dimension: implicit_assumptions
    severity: medium
    description: "SSH 缓存数据可能数小时前，与新鲜本地数据混合显示"
    resolution: "Accordion 设备行 > 30min 未同步时显示淡化 + 'stale' 提示"
    status: mitigated

  - id: FIND-006
    target: FEAT-008
