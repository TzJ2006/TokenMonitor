      scenario: "Shell RC PATH removal corrupts config"
      severity: high

  blue_team:
    - attack: ATK-001
      verdict: mitigated
      mitigation: "Register TaskbarCreated message, re-embed on Explorer restart with 3s delay"
    - attack: ATK-002
      verdict: mitigated
      mitigation: "Query ABM_GETTASKBARPOS; if vertical/auto-hide, fallback to tooltip mode"
    - attack: ATK-003
      verdict: mitigated
      mitigation: "GetDpiForWindow() on taskbar, match rendering DPI, handle WM_DPICHANGED"
    - attack: ATK-004
      verdict: mitigated
      mitigation: "Query taskbar height via GetWindowRect, resize panel to match, listen WM_SIZE"
    - attack: ATK-005
      verdict: mitigated
      mitigation: "Versioned strategy pattern (Win10/Win11), graceful fallback if hierarchy not found"
    - attack: ATK-006
      verdict: defended
      mitigation: "All Win32 ops serialized on main thread via PostMessage"
    - attack: ATK-007
      verdict: mitigated
      mitigation: "Fallback to tooltip mode. Code-signed binary reduces false positives"
    - attack: ATK-008
      verdict: mitigated
      mitigation: "Clamp window to work area after every move_window() call"
    - attack: ATK-009
      verdict: mitigated
      mitigation: "Only remove portable Node.js inside TokenMonitor directory, never system install"
    - attack: ATK-010
      verdict: mitigated
      mitigation: "Use BEGIN/END marker blocks in shell RC; remove only between markers"
