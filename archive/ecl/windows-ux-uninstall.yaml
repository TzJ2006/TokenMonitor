ecl_version: "1.0"
feature: "windows-ux-uninstall"
status: phase-9-implemented
created: 2026-03-25
updated: 2026-03-25
pending_input: null

# ── Validated Requirements ────────────────────────────────────────────────────

requirements:
  - id: REQ-001
    text: "Cross-platform uninstaller that cleans up app + prereqs + app data"
    status: verified
    confidence: 0.95
    source: user-stated
    acceptance_criteria:
      - "macOS: removes .app, app data, LaunchAgent, shell RC PATH entries"
      - "Windows: removes app data, registry entries, Node.js portable, PATH"
      - "Linux: removes .deb, app data, XDG autostart, shell RC PATH entries"
      - "Never removes system-wide Node.js, only portable copy"
      - "Uses marker-delimited blocks for shell RC modifications"

  - id: REQ-002
    text: "Fix Windows window positioning — window exceeds screen boundary and cannot be moved"
    status: verified
    confidence: 0.95
    source: user-stated
    acceptance_criteria:
      - "Window is clamped to monitor work area after positioning"
      - "Window never appears off-screen or behind taskbar"
      - "Works correctly with DPI scaling and multi-monitor setups"

  - id: REQ-003
    text: "Windows taskbar embedding — show utilization + cost in taskbar panel"
    status: verified
    confidence: 0.90
    source: user-stated
    acceptance_criteria:
      - "Raw Win32 child window embedded in Windows taskbar via SetParent()"
      - "Displays: C:45% X:23% $3.2 (provider utilization + daily cost)"
      - "Position: between app list and system tray area"
      - "DPI-aware rendering with Segoe UI font"
      - "Survives Explorer.exe restart via TaskbarCreated message"
      - "Graceful fallback to standard tray if embedding fails"

  - id: REQ-004
    text: "Platform-specific code organized into separate folders per OS"
    status: verified
    confidence: 1.0
    source: user-stated
    acceptance_criteria:
      - "Rust: src-tauri/src/platform/{windows,macos,linux}/"
      - "Frontend: src/lib/platform/{windows,macos,linux}/ if needed"
      - "Shared code remains in common locations"
      - "Conditional compilation via #[cfg(target_os)] in Rust"

# ── Decisions ─────────────────────────────────────────────────────────────────

decisions:
  - id: DEC-001
    text: "Use raw Win32 window (GDI rendering) for taskbar embedding, not Tauri WebView"
    rationale: "WebView2 is too heavy for a small taskbar panel; GDI matches taskbar's own rendering"
    date: 2026-03-25

  - id: DEC-002
    text: "Use `windows` crate (Microsoft official) for Win32 API bindings"
    rationale: "Type-safe, auto-generated from Windows metadata, actively maintained"
    date: 2026-03-25

  - id: DEC-003
    text: "Fallback to standard tray tooltip if taskbar embedding fails"
    rationale: "Embedding depends on undocumented internals; must degrade gracefully"
    date: 2026-03-25

  - id: DEC-004
    text: "Platform code in src-tauri/src/platform/{os}/ with conditional compilation"
    rationale: "User explicitly requested OS-specific code in separate folders"
    date: 2026-03-25

  - id: DEC-005
    text: "Uninstall prereq PATH entries use marker-delimited blocks"
    rationale: "Prevents corrupting shell RC files during cleanup"
    date: 2026-03-25

# ── Features ──────────────────────────────────────────────────────────────────

features:
  - id: FEAT-001
    name: "Platform code reorganization"
    parent: [REQ-004]
    modules: [MOD-001]
    dependencies: []
    complexity: small

  - id: FEAT-002
    name: "Window positioning fix"
    parent: [REQ-002]
    modules: [MOD-002]
    dependencies: [FEAT-001]
    complexity: small

  - id: FEAT-003
    name: "Windows taskbar embedding"
    parent: [REQ-003]
    modules: [MOD-003, MOD-004, MOD-005, MOD-006]
    dependencies: [FEAT-001]
    complexity: large

  - id: FEAT-004
    name: "Cross-platform uninstall scripts"
    parent: [REQ-001]
    modules: [MOD-007, MOD-008, MOD-009]
    dependencies: []
    complexity: medium

# ── Modules ───────────────────────────────────────────────────────────────────

modules:
  - id: MOD-001
    name: "Platform folder structure + move existing platform code"
    parent: FEAT-001
    description: >
      Create src-tauri/src/platform/{windows,macos,linux}/mod.rs.
      Move existing macOS-only code (dock icon, glass effect) into platform/macos/.
      Move existing window positioning into shared module with platform-specific clamp.
      Use #[cfg(target_os)] for conditional compilation.
    file_path: "src-tauri/src/platform/"

  - id: MOD-002
    name: "Window position clamping to work area"
    parent: FEAT-002
    description: >
      After move_window(), read back position and clamp to monitor work area.
      On Windows: use GetMonitorInfo/rcWork for accurate work area.
      Account for DPI scaling. Ensure window is fully visible.
    file_path: "src-tauri/src/platform/windows/window.rs"

  - id: MOD-003
    name: "Win32 taskbar discovery + embedding"
    parent: FEAT-003
    description: >
      Find Shell_TrayWnd (verify explorer.exe ownership).
      Create raw WNDCLASS child window.
      SetParent() into taskbar, positioned between app list and tray.
      Handle WM_TASKBARCREATED for Explorer restart recovery.
      Fallback to tray tooltip if embedding fails.
    file_path: "src-tauri/src/platform/windows/taskbar.rs"

  - id: MOD-004
    name: "Taskbar panel GDI rendering"
    parent: FEAT-003
    description: >
      WM_PAINT handler: render "C:45% X:23% $3.2" text with DPI-aware Segoe UI.
      Theme-aware colors (dark/light taskbar detection).
      Handle WM_DPICHANGED for live DPI changes.
      Handle WM_SIZE for taskbar height changes.
    file_path: "src-tauri/src/platform/windows/taskbar.rs"

  - id: MOD-005
    name: "Taskbar panel data bridge"
    parent: FEAT-003
    description: >
      Connect existing background refresh loop to taskbar panel updates.
      Serialize updates on main thread via PostMessage.
      Update panel text when usage data changes.
    file_path: "src-tauri/src/platform/windows/taskbar.rs"

  - id: MOD-006
    name: "Taskbar embedding settings UI"
    parent: FEAT-003
    description: >
      Add toggle in Settings.svelte: "Embed in taskbar" (Windows only).
      Store preference in settings. Enable/disable embedding at runtime.
    file_path: "src/lib/components/Settings.svelte"

  - id: MOD-007
    name: "macOS uninstall script"
    parent: FEAT-004
    description: >
      Kill running process, unload LaunchAgent, remove .app from /Applications,
      remove ~/Library/Application Support/com.tokenmonitor.app/,
      remove ~/.tokenmonitor/ (portable Node.js + ccusage),
      remove marker-delimited PATH entries from shell RC.
    file_path: "build/uninstall/uninstall-macos.sh"

  - id: MOD-008
    name: "Windows uninstall script"
    parent: FEAT-004
    description: >
      Delegate to NSIS uninstaller for app removal if present.
      Remove %APPDATA%/com.tokenmonitor.app/ and %LOCALAPPDATA%/ equivalent.
      Remove %LOCALAPPDATA%\TokenMonitor\ (portable Node.js + ccusage only).
      Clean autostart registry entry. Clean user PATH of TokenMonitor entries.
      Never touch system-wide Node.js.
    file_path: "build/uninstall/uninstall-windows.bat"

  - id: MOD-009
    name: "Linux uninstall script"
    parent: FEAT-004
    description: >
      Kill running process, apt purge token-monitor if installed.
      Remove ~/.config/com.tokenmonitor.app/.
      Remove ~/.tokenmonitor/ (portable Node.js + ccusage).
      Remove XDG autostart entry.
      Remove marker-delimited PATH entries from shell RC.
    file_path: "build/uninstall/uninstall-linux.sh"

# ── Dependency Graph ──────────────────────────────────────────────────────────

dependency_graph:
  FEAT-001: []                    # platform reorganization (no deps)
  FEAT-002: [FEAT-001]            # window fix needs platform structure
  FEAT-003: [FEAT-001]            # taskbar embedding needs platform structure
  FEAT-004: []                    # uninstall scripts independent

