ecl_version: "1.0"
feature: "float-ball-fixes-batch"
status: completed
created: 2026-03-26
updated: 2026-03-26

prompt_calibration:
  raw_input: |
    5个问题: 1.悬浮球无法拖动 2.悬浮球控制应该和任务栏控制分开
    3.主界面缩小时先上后下 4.展开面板是完整矩形应该有凹槽
    5.面板不自适应边缘应该镜像布局
  calibrated_scenario: |
    Fix 5 FloatBall/window issues on Windows:
    1. Drag broken — startDragging() in setTimeout loses event context
    2. Float ball toggle hidden on Windows; taskbar panel never wired
    3. CSS content visually jumps when window shrinks (bottom misalignment)
    4. Expanded panel Win32 region is plain rounded rect, needs ball notch
    5. Panel doesn't flip direction near edges; layout not mirrored
  questions_asked: 2
  questions_answered:
    - "Issue 3 is CSS content animation, not window movement"
    - "Issue 4 notch follows ball position, radius=ball radius"

requirements:
  - id: REQ-001
    text: "Float ball must be draggable via long-press"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "Long press (>5px movement) initiates window drag"
      - "Short tap (<5px movement) toggles expand/collapse"
      - "After drag ends, ball snaps to nearest edge"
      - "Works on Windows, macOS, Linux"
    root_cause: |
      startDragging() called inside setTimeout(180ms) — by then the
      browser event context has expired. Win32 needs the drag initiation
      in the same event turn.
    fix_approach: |
      Replace setTimeout+startDragging with pointer-capture manual drag.
      onPointerDown: capture pointer, record start position.
      onPointerMove: if delta > 5px threshold, enter drag mode and use
        invoke("move_float_ball_to", {x, y}) to move the window.
      onPointerUp: if still within threshold, toggle expand/collapse.
      After drag ends, invoke("snap_float_ball").
    decomposition:
      features: [FEAT-001]

  - id: REQ-002
    text: "Float ball and taskbar panel controls must be independent"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "Settings shows 'Floating Ball' toggle on all platforms"
      - "Settings shows 'Taskbar Panel' toggle on Windows only"
      - "Both can be on/off independently"
      - "On startup, each is restored from saved settings"
    root_cause: |
      On Windows/Linux, floatBall toggle is hidden via
      `!usesFloatingStatusWidget()`. Ball is force-created at bootstrap.
      init_taskbar_panel() exists but is never called. No taskbarPanel
      setting exists.
    fix_approach: |
      1. Add `taskbarPanel: boolean` to Settings type and store
      2. Show floatBall toggle on ALL platforms (remove the guard)
      3. Show taskbarPanel toggle on Windows only
      4. Wire init_taskbar_panel/destroy_taskbar_panel as IPC commands
      5. Update bootstrap to respect both settings independently
    decomposition:
      features: [FEAT-002, FEAT-003]

  - id: REQ-003
    text: "Main window content must stay visually anchored to bottom"
    status: verified
    confidence: 0.85
    acceptance_criteria:
      - "When content shrinks, no visible 'jump up' before window resizes"
      - "Content bottom edge appears to stay flush with taskbar top"
      - "Grow behavior unchanged (immediate resize)"
    root_cause: |
      CSS content is top-aligned in window. When content shrinks,
      empty space appears at bottom (between content and taskbar).
      The shrink debounce (16ms + 2×rAF ≈ 50-100ms) delays the native
      window resize, making the gap visible.
    fix_approach: |
      CSS fix: make .pop use flex column with justify-content: flex-end
      so content is bottom-aligned within the window. When content
      shrinks, empty space appears at TOP (away from taskbar, less
      visible). Combined with the atomic SetWindowPos resize, the
      visual effect is eliminated.
    decomposition:
      features: [FEAT-004]

  - id: REQ-004
    text: "Expanded panel Win32 region must have semicircular ball notch"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "Collapsed: circular region (unchanged)"
      - "Expanded: panel rounded-rect + ball circle, with smooth notch"
      - "Notch position follows expand_direction (left/right side)"
      - "On non-Windows: CSS clip-path achieves equivalent visual"
    root_cause: |
      apply_float_ball_region uses CreateRoundRectRgn for expanded,
      covering the entire window as one rectangle. No ball notch.
    fix_approach: |
      New region composition for expanded state:
      1. panel_rgn = CreateRoundRectRgn covering panel area
      2. notch_circle = CreateEllipticRgn at ball position
      3. panel_with_notch = CombineRgn(panel_rgn, notch_circle, RGN_DIFF)
      4. ball_circle = CreateEllipticRgn at ball position
      5. final = CombineRgn(panel_with_notch, ball_circle, RGN_OR)

      Also need to update CSS: remove gap between ball and panel,
      panel uses padding to avoid content overlapping the notch area.
    decomposition:
      features: [FEAT-005]

  - id: REQ-005
    text: "Panel must adapt direction near edges and mirror layout"
    status: verified
    confidence: 0.90
    acceptance_criteria:
      - "Near right edge: panel expands left with mirrored layout"
      - "Near left edge: panel expands right with normal layout"
      - "Layout elements (bars, labels, icons) are horizontally mirrored"
      - "Text content is NOT mirrored (stays LTR)"
      - "Transition between directions is seamless"
    root_cause: |
      choose_expand_direction hardcodes direction for Left/Right anchors.
      CSS only does flex-direction:row-reverse but panel content stays
      left-aligned. No content mirroring.
    fix_approach: |
      Rust: improve choose_expand_direction for all anchors to check
      available space in both directions.
      CSS: when data-direction="left", apply direction:rtl on .panel
      (mirrors grid/flex layout) with direction:ltr on text elements
      (preserves text readability). This mirrors the progress bars,
      labels, and spacing without mirroring text.
    decomposition:
      features: [FEAT-006, FEAT-007]

