modules:
  - id: MOD-001
    name: "Pointer capture drag handler"
    parent: FEAT-001
    description: |
      Replace setTimeout+startDragging with:
      - onPointerDown: setPointerCapture, record startX/startY
      - onPointerMove: if delta > 5px, enter drag mode, invoke IPC to
        move window by (deltaX, deltaY) from original position
      - onPointerUp: if not dragged, toggle expand; if dragged, snap
      Need new IPC command: move_float_ball_to(x, y) that calls
      SetWindowPos to move the float ball window.

  - id: MOD-002
    name: "Remove floatBall toggle guard"
    parent: FEAT-002
    description: |
      Remove `{#if !usesFloatingStatusWidget()}` guard around the
      Floating Ball toggle in Settings.svelte. Show on all platforms.

  - id: MOD-003
    name: "Update bootstrap float ball logic"
    parent: FEAT-002
    description: |
      Change bootstrap.ts line 45 from
        `if (usesFloatingStatusWidget() || saved.floatBall)`
      to
        `if (saved.floatBall)`
      so float ball respects the user's preference on all platforms.

  - id: MOD-004
    name: "Add taskbarPanel setting"
    parent: FEAT-003
    description: |
      Add `taskbarPanel: boolean` to Settings interface and defaults.
      Add handleTaskbarPanel function in Settings.svelte.
      Show toggle only on Windows (isWindows() guard).

  - id: MOD-005
    name: "Wire taskbar panel IPC commands"
    parent: FEAT-003
    description: |
      Create init_taskbar_panel and destroy_taskbar_panel Tauri commands
      that delegate to the existing taskbar.rs functions.
      Register in lib.rs invoke_handler.
      Call from bootstrap.ts based on taskbarPanel setting.

  - id: MOD-006
    name: "Bottom-align .pop content"
    parent: FEAT-004
    description: |
      Add to .pop CSS:
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      This anchors content to the bottom of the window.

  - id: MOD-007
    name: "Composite Win32 region with ball notch"
    parent: FEAT-005
    description: |
      Modify apply_float_ball_region to accept expand_direction and
      ball position. For expanded state:
      1. Create panel rounded-rect region
      2. Subtract ball-sized circle (creates notch)
      3. Union ball circle back
      Parameters: window size, ball_size, expand_direction, ball_y_offset

  - id: MOD-008
    name: "Remove CSS gap, add notch-aware padding"
    parent: FEAT-005
    description: |
      Remove the 10px gap between ball and panel in CSS.
      Add padding on the panel's ball-side to account for the notch area.
      The panel background should not extend into the notch.

  - id: MOD-009
    name: "Space-aware expand direction for all anchors"
    parent: FEAT-006
    description: |
      Update choose_expand_direction: for Left/Right anchors, also
      check if there's enough room for the panel in the preferred
      direction. If not, flip. Keep current Bottom logic (already works).

  - id: MOD-010
    name: "RTL-based panel mirroring"
    parent: FEAT-007
    description: |
      When data-direction="left", add `dir="rtl"` on .panel element.
      Add `dir="ltr"` on all text-containing children (.eyebrow, .title,
      .provider-tag, .pct, .placeholder). This mirrors grid columns,
      flex alignment, and spacing while keeping text LTR.

probes:
  - target: FEAT-001
    type: assumption
    question: "Does Tauri v2 support setPointerCapture + manual window move via IPC?"
    method: code-inspection
    result: |
      Yes. setPointerCapture is a standard DOM API.
      We can use invoke("move_float_ball_to") with SetWindowPos in Rust.
      No startDragging() needed.
    verdict: feasible

  - target: FEAT-005
    type: assumption
    question: "Can CombineRgn(RGN_DIFF) create smooth notch between rect and circle?"
    method: code-inspection
    result: |
      Yes. Win32 CombineRgn with RGN_DIFF subtracts the second region
      from the first. Then RGN_OR adds the ball back.
      CreateEllipticRgn produces pixel-accurate circles.
    verdict: feasible

  - target: FEAT-003
    type: assumption
    question: "Is init_taskbar_panel functional but just unwired?"
    method: code-inspection
    result: |
      Yes. taskbar.rs has complete implementation: find_taskbar_hwnd,
      embed_in_taskbar, panel_wnd_proc, paint_panel, re_embed_panel.
      Only missing: IPC command wrapper and registration.
      Clippy confirms it's unused code.
    verdict: feasible

confrontation:
  red_team:
    - id: ATK-001
      scenario: "Pointer capture drag fails on touchscreen"
      severity: low
    - id: ATK-002
      scenario: "Win32 region notch has pixel artifacts at non-integer DPI scaling"
      severity: medium
    - id: ATK-003
      scenario: "Bottom-align CSS breaks content that needs top-alignment (splash, loading)"
      severity: high
    - id: ATK-004
      scenario: "RTL direction on panel breaks bar-fill animation direction"
      severity: medium
    - id: ATK-005
      scenario: "Taskbar panel init fails on modified/custom Windows shells"
      severity: low
  blue_team:
    - attack: ATK-001
      verdict: defended
      rationale: "PointerEvent API handles both mouse and touch uniformly"
    - attack: ATK-002
      verdict: mitigated
      mitigation: "Use DPI-scaled integer coordinates for all region calculations"
    - attack: ATK-003
      verdict: mitigated
      mitigation: |
        Only apply bottom-alignment when in main data view.
        Splash/loading/setup screens use their own centering layout.
        The .pop-content div can be flex-grow:1 to fill available space.
    - attack: ATK-004
      verdict: mitigated
      mitigation: |
        Override .bar-fill transition to use CSS logical properties
        or explicit direction:ltr on .bar-track to prevent RTL flip.
    - attack: ATK-005
      verdict: defended
      rationale: "taskbar.rs already has graceful fallback (returns Ok(false))"

