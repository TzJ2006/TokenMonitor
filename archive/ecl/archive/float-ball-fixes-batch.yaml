decisions:
  - id: DEC-001
    phase: 3
    decision: "Use pointer capture + manual IPC move instead of startDragging"
    rationale: "startDragging() requires same event turn; pointer capture gives full control"
  - id: DEC-002
    phase: 3
    decision: "Use CombineRgn for notch shape instead of custom path"
    rationale: "Standard Win32 API, no GDI+ dependency needed"
  - id: DEC-003
