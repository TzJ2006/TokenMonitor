ecl_version: "1.0"
feature: "float-ball-snap-threshold"
status: completed
created: 2026-03-26
updated: 2026-03-26

prompt_calibration:
  raw_input: "悬浮球应该只在接近边缘时才吸附，不要自动吸附。支持四边（上下左右）吸附。"
  intent_decomposition:
    total_intents: 1
    total_tracks: 1
    tracks:
      - track_id: T1
        name: "Float ball conditional snap + 4-edge support"
        priority: 1
        intents:
          - raw: "球距离边缘很近时才吸附，支持顶端底端侧端"
            type: feature
  tracks:
    T1:
      calibrated_scenario: |
        Modify float ball snap behavior: only snap when ball edge is within
        20px of a screen work-area edge. Add Top anchor support (currently
        only Left/Right/Bottom). All 4 edges use half-hidden positioning
        (ball center on the edge, half outside). If ball is >20px from all
        edges on drag end, it stays in place (no snap).

requirements:
  - id: REQ-001
    text: "Only snap when ball is within 20px of a screen edge"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "If min distance to any edge > 20px after drag, ball stays at drop position"
      - "If min distance to any edge <= 20px, ball snaps to that edge"
      - "Distance measured from ball's nearest edge to screen work-area boundary"
    decomposition:
      features: [FEAT-001]

  - id: REQ-002
    text: "Support snapping to all 4 edges: Top, Bottom, Left, Right"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "FloatBallAnchor enum includes Top variant"
      - "Top anchor positions ball half-hidden above top edge"
      - "choose_float_ball_anchor considers top distance"
      - "layout_float_ball_rect handles Top anchor for collapsed and expanded"
    decomposition:
      features: [FEAT-002]

  - id: REQ-003
    text: "Half-hidden positioning on all 4 edges"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "Left: x = bounds.left - ball_size/2"
      - "Right: x = bounds.right - ball_size/2"
      - "Top: y = bounds.top - ball_size/2"
      - "Bottom: y = bounds.bottom - ball_size/2"
    decomposition:
      features: [FEAT-003]

features:
  - id: FEAT-001
    name: "Snap distance threshold"
    parent: REQ-001
    file: "src-tauri/src/commands/float_ball.rs"
    changes:
      - "Add SNAP_THRESHOLD_PX constant (20px logical, scaled to physical)"
      - "In snap_float_ball: compute min distance to all 4 edges"
      - "If min distance > threshold, skip snap (return early)"
      - "If min distance <= threshold, snap to nearest edge as before"

  - id: FEAT-002
    name: "Top anchor support"
    parent: REQ-002
    file: "src-tauri/src/commands/float_ball.rs"
    changes:
      - "Add FloatBallAnchor::Top variant"
      - "Update choose_float_ball_anchor to include top_distance"
      - "Update layout_float_ball_rect for Top anchor (collapsed + expanded)"
      - "Update choose_expand_direction for Top anchor"

  - id: FEAT-003
    name: "Half-hidden positioning for Top/Bottom"
    parent: REQ-003
    file: "src-tauri/src/commands/float_ball.rs"
    changes:
      - "Top collapsed: y = bounds.top - ball_size/2"
      - "Bottom collapsed: y = bounds.bottom - ball_size/2 (change from current bounds.bottom - ball_size)"
      - "Top expanded: panel expands downward"
      - "Bottom expanded: panel expands upward (current behavior)"

dependency_graph:
  FEAT-002: []
  FEAT-003: [FEAT-002]
  FEAT-001: [FEAT-002]

decisions:
  - id: DEC-001
    decision: "20px logical threshold for snap trigger"
    rationale: "User confirmed ~20px feels right"
  - id: DEC-002
    decision: "Half-hidden on all 4 edges"
    rationale: "User prefers consistency, same as current Left/Right behavior"
  - id: DEC-003
    decision: "Frontend unchanged"
    rationale: "expandDirection (Left/Right) still works; Top/Bottom anchors expand horizontally"
