ecl_version: "1.0"
feature: "revert-cost-calculation-to-original"
status: completed
created: 2026-03-28
updated: 2026-03-28

prompt_calibration:
  raw_input: "阅读原始仓库 https://github.com/Michael-OvO/TokenMonitor，将费用计算逻辑回退到与原始一致"
  intent_decomposition:
    total_intents: 1
    total_tracks: 1
    tracks:
      - track_id: T1
        name: "Revert cost calculation to local-parser-only"
        priority: 1
        intents:
          - raw: "回退费用计算逻辑，和原始仓库保持一致"
            type: revert
  tracks:
    T1:
      calibrated_scenario: |
        Remove the ccusage CLI intermediary from the cost calculation pipeline.
        Currently get_provider_data() tries ccusage CLI first and falls back to
        the local parser on failure. The original repo always uses the local
        JSONL parser + pricing.rs for cost calculation. Revert to that behavior.
      intent_dimensions:
        task: { status: present, value: "Remove ccusage from cost calculation path" }
        input: { status: present, value: "Local JSONL session files" }
        output: { status: present, value: "UsagePayload computed by local parser + pricing.rs" }
        constraints: { status: enriched, value: "pricing.rs rates are identical; parser logic identical; only routing differs" }
        context: { status: enriched, value: "Tauri v2 + Rust backend, commands/usage_query.rs dispatches" }
        success_criteria: { status: resolved, value: "get_provider_data always uses local parser; no ccusage CLI dependency in main path" }

context_scan:
  pricing_rs: "Identical between original and current — no changes needed"
  parser_rs: "Logic identical — no changes needed"
  key_difference: |
    commands/usage_query.rs:get_provider_data() lines 226-234:
    Currently tries ccusage::fetch_usage_payload() first, falls back to
    parser_payload_for_period() on error. Original always called parser directly.
  secondary_artifacts:
    - "UsageSource enum (Ccusage/Parser/Mixed) in models.rs — added for dual-source"
    - "usage_warning field in UsagePayload — shows fallback messages"
    - "usage/ccusage.rs — entire module for external CLI integration"
    - "Frontend types/index.ts has UsageSource type"
    - "Calendar.svelte shows usage_warning UI"

requirements:
  - id: REQ-001
    text: "get_provider_data() always uses local parser, never ccusage CLI"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "get_provider_data() calls parser_payload_for_period() directly"
      - "No ccusage::fetch_usage_payload() call in main data path"
      - "UsageSource always set to Parser"
      - "usage_warning not set for normal operation"
    decomposition:
      features: [FEAT-001, FEAT-002]

  - id: REQ-002
    text: "Keep ccusage module for future use but remove from active path"
    status: verified
    confidence: 0.90
    acceptance_criteria:
      - "ccusage.rs still compiles but is not called from get_provider_data"
      - "No breaking changes to module structure"

  - id: REQ-003
    text: "Frontend remains compatible"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "UsagePayload still has usage_source and usage_warning fields"
      - "Frontend compiles without changes"
      - "All tests pass"

features:
