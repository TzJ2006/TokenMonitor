    name: "Revert get_provider_data routing"
    parent: REQ-001
    complexity: small
    file: "src-tauri/src/commands/usage_query.rs"

  - id: FEAT-002
    name: "Remove ccusage from calendar path if present"
    parent: REQ-001
    complexity: small
    file: "src-tauri/src/commands/calendar.rs"

dependency_graph:
  FEAT-001: []
  FEAT-002: []

risk_assessment:
  overall: low
  notes: |
    - pricing.rs identical — zero risk of rate changes
    - parser.rs identical — zero risk of parsing changes
    - Only routing logic changes — small blast radius
    - ccusage module kept for backward compatibility
