requirements:
  - id: REQ-001
    text: "Fix transparency on non-macOS: glass CSS overrides active without native blur"
    status: verified
    confidence: 0.98
    root_cause: |
      settings.ts:74 defaults glassEffect=true.
      applyGlass() sets data-glass="true" on all platforms.
      CSS: dark --surface becomes rgba(20,20,22,0.65), light becomes rgba(255,255,255,0.45).
      No native NSVisualEffectView blur on Windows/Linux → semi-transparent with no backing.
    acceptance_criteria:
      - "On Windows/Linux, glass CSS overrides never apply (data-glass stays false)"
      - "Light theme on Windows shows fully opaque --surface: #FFFFFF"
      - "Dark theme on Windows shows fully opaque --surface: #141416"
      - "macOS glass effect toggle remains functional"
    decomposition:
      features: [FEAT-001]

  - id: REQ-002
    text: "DROPPED — Settings Floating Ball toggle already exists"
    status: invalidated
    confidence: 1.0
    note: "Settings.svelte:601-605 has ToggleSwitch for floatBall"

  - id: REQ-003
    text: "SSH ccusage CLI remote execution + multi-server display"
    status: deferred
    confidence: 0.90
    note: |
      Planned in cross-platform-ccusage-ssh.yaml Phase D (FEAT-D1 through D6).
      Deferred to separate implementation cycle — focus on UI polish first.
    acceptance_criteria:
      - "SSH to configured hosts, execute ccusage CLI, parse JSON output"
      - "Display per-server usage in a multi-device view"

  - id: REQ-004
    text: "Chart hover detail panel fade-out animation ~1s"
    status: verified
    confidence: 0.95
    root_cause: |
      Chart.svelte: .detail has CSS transition (max-height 1s, opacity 0.8s).
      BUT {#if displayed} destroys inner content instantly when displayed=null.
      Container transitions but content is already gone → no visible fade-out.
    acceptance_criteria:
      - "Detail panel fades out smoothly over ~1s (matching fade-in)"
      - "Content remains visible during fade-out transition"
      - "Panel still auto-hides after 500ms debounce when cursor leaves chart"
    decomposition:
      features: [FEAT-002]

  - id: REQ-005
    text: "All view transitions animate with ≥0.5s duration"
    status: verified
    confidence: 0.95
    current_state: |
      App.svelte uses {#if}/{:else if} blocks:
      - Settings: has slideIn 0.22s entry, no exit animation
      - Calendar: no transition
      - SplashScreen → main: instant swap
      - SetupScreen: no transition
      All view switches are instant (Svelte destroys/creates immediately).
    acceptance_criteria:
      - "Settings open: slide-in from right (≥0.5s)"
      - "Settings close: slide-out to right (≥0.5s)"
      - "Calendar open: slide-in (≥0.5s)"
      - "Calendar close: slide-out (≥0.5s)"
      - "Splash → main: fade transition"
      - "View transitions feel smooth and intentional"
    decomposition:
      features: [FEAT-003]

  - id: REQ-006
    text: "FloatBall: bars on right side, remove white rectangular background"
    status: verified
    confidence: 0.95
    current_state: |
      FloatBall.svelte: flex-direction: column (bars above ball).
      Panel: 170px wide with background rgba(20,20,22,0.94).
      Tauri window has a visible background behind the ball element.
    acceptance_criteria:
      - "Usage bars appear to the RIGHT of the ball (horizontal layout)"
      - "No visible rectangular/square background behind the float ball"
      - "Dragging still works (startDragging + snap_float_ball preserved)"
      - "Click-vs-drag discrimination preserved (180ms threshold)"
      - "Expanded state shows bars horizontally beside ball"
    decomposition:
      features: [FEAT-004]

# ══════════════════════════════════════════════════════════════════════════════
# FEATURES
# ══════════════════════════════════════════════════════════════════════════════

features:
  - id: FEAT-001
    name: "Platform-aware glass effect guard"
    parent: REQ-001
    complexity: small
    dependencies: []
    description: |
      Two changes:
      1. applyGlass(): check isMacOS() before setting data-glass="true".
         On non-macOS, always set data-glass="false".
      2. Default glassEffect to false in settings.ts (safer default).
         macOS users can enable in Settings.
    files:
      - src/lib/stores/settings.ts (default value)
      - src/lib/stores/settings.ts (applyGlass function)
      - src/lib/utils/platform.ts (import)

  - id: FEAT-002
    name: "Chart detail panel fade-out"
    parent: REQ-004
    complexity: small
    dependencies: []
    description: |
      Keep a "lastDisplayed" snapshot so content remains during fade-out.
      When displayed becomes null, content continues showing for the
      duration of the CSS opacity transition (~1s).

      Approach: separate displayedContent state from visibility flag.
      - On show: set content + visible
      - On hide: remove visible (triggers CSS fade), delay content removal by 1s
    files:
      - src/lib/components/Chart.svelte

  - id: FEAT-003
    name: "View transition animations"
    parent: REQ-005
    complexity: medium
    dependencies: []
    description: |
      Add CSS transitions for view switching in App.svelte:
      - Settings: slide-in-right on open, slide-out-right on close (0.5s)
      - Calendar: slide-in-right on open, slide-out-right on close (0.5s)
      - Splash → main: existing popIn animation (already has 0.32s)

      Implementation: use wrapper divs with CSS animation classes.
      On close: play exit animation, then swap state after animation ends.
      Using setTimeout matching animation duration (not Svelte transitions
      to avoid SSR complications in Tauri).
    files:
      - src/App.svelte
      - src/app.css (new keyframes)

  - id: FEAT-004
    name: "FloatBall horizontal layout + transparent background"
    parent: REQ-006
    complexity: medium
    dependencies: []
    description: |
      1. Layout: change container from vertical to horizontal (flex-direction: row).
         Ball on left, usage bars panel on right when expanded.
         Panel grows rightward from ball (animation: slide-right).
      2. Background: ensure Tauri float-ball window is fully transparent.
         Remove any visible background from #float-ball container.
         Only the ball circle and bars panel have visible backgrounds.
      3. Window sizing: adjust float-ball window dimensions for horizontal layout.
         Collapsed: ~56x56 (ball only). Expanded: ~230x56 (ball + bars).
      4. Preserve: drag, click/drag discrimination, snap_float_ball.
    files:
      - src/lib/components/FloatBall.svelte
      - float-ball.html (if background needs fixing)
      - src-tauri/src/commands.rs (window size for expanded state)

