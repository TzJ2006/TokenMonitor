ecl_version: "1.0"
feature: "simplify-future-work"
status: completed
created: 2026-03-26
updated: 2026-03-26

prompt_calibration:
  raw_input: "请完成future work (from /simplify code review)"
  calibrated_scenario: |
    Complete 7 refactoring items identified by the /simplify code review:
    1. Split commands.rs (2466 lines) into focused modules
    2. Split rate_limits.rs (1202 lines) into provider modules
    3. Replace stringly-typed TrayConfig fields with Rust enums
    4. Fix double JSONL scanning in get_provider_data
    5. Smarter cache invalidation on background tick
    6. Cache CLI path resolution with OnceLock
    7. Deduplicate tray title formatting (Rust + TypeScript)
  questions_asked: 0

requirements:
  - id: REQ-001
    text: "Split commands.rs into focused modules under commands/ directory"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "No single file exceeds 800 lines (excluding tests)"
      - "All 199 Rust tests pass"
      - "cargo clippy produces no new warnings"
      - "Existing IPC command signatures unchanged"
    risk_score: 3  # Low — pure structural refactor, no behavior change

  - id: REQ-002
    text: "Split rate_limits.rs into provider-specific modules"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "claude.rs, codex.rs, and mod.rs under rate_limits/ directory"
      - "All tests pass"
      - "Public API unchanged"
    risk_score: 3

  - id: REQ-003
    text: "Replace TrayConfig String fields with typed Rust enums"
    status: verified
    confidence: 0.9
    acceptance_criteria:
      - "bar_display, percentage_format, cost_precision are enums"
      - "Serde serialization unchanged (camelCase JSON)"
      - "All string comparisons replaced with pattern matches"
      - "Frontend TypeScript types already use string unions — no TS changes needed"
    risk_score: 4  # Touches serialization boundary

  - id: REQ-004
    text: "Eliminate double JSONL scanning in get_provider_data"
    status: verified
    confidence: 0.8
    acceptance_criteria:
      - "load_entries called only once per get_provider_data invocation"
      - "Aggregation methods accept pre-loaded entries"
      - "No change in computed results (test parity)"
    risk_score: 7  # Medium-high — changes parser API, touches hot path

  - id: REQ-005
    text: "Replace clear_payload_cache with targeted invalidation on background tick"
    status: verified
    confidence: 0.75
    acceptance_criteria:
      - "Background tick only re-fetches if JSONL files changed (mtime check)"
      - "Tray updates still reflect fresh data"
      - "Cache hit rate improves in steady state"
    risk_score: 6  # Medium — changes cache invalidation semantics

  - id: REQ-006
    text: "Cache resolved CLI path with OnceLock"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "CLI path resolved once per app session"
      - "Subsequent calls return cached path"
      - "Tests pass"
    risk_score: 2  # Low — small, isolated change

  - id: REQ-007
    text: "Deduplicate tray title formatting — single source of truth"
    status: verified
    confidence: 0.85
    acceptance_criteria:
      - "Title computed in Rust only, sent to frontend via StatusWidgetSummary.title"
      - "TypeScript formatTrayTitle removed or delegates to Rust"
      - "FloatBall uses the Rust-computed title"
    risk_score: 5  # Medium — cross-language change

dependency_graph:
  REQ-001: []           # No deps — do first, enables cleaner changes
  REQ-002: []           # Independent of REQ-001
  REQ-003: [REQ-001]    # Easier after commands.rs is split
  REQ-006: [REQ-002]    # Easier after rate_limits.rs is split
  REQ-007: [REQ-001]    # Touches tray module from commands split
  REQ-004: [REQ-001]    # Touches usage orchestration from commands split
  REQ-005: [REQ-004]    # Depends on understanding new parser API

implementation_waves:
  wave_1:
    name: "Structural refactoring (no behavior change)"
    items: [REQ-001, REQ-002]
    parallel: true
    estimated_scope: "large — file moves, module declarations, import updates"

  wave_2:
    name: "Type safety and small optimizations"
    items: [REQ-003, REQ-006]
    parallel: true
    estimated_scope: "medium — enum definitions, serde, OnceLock"

  wave_3:
    name: "Performance and deduplication"
    items: [REQ-004, REQ-005, REQ-007]
    parallel: false
    estimated_scope: "large — parser API changes, cache strategy, cross-language"

module_extraction_plan:
  commands_rs:
    target: "src-tauri/src/commands/"
    modules:
      - name: "mod.rs"
        contents: "AppState, parse_usage_selection, re-exports"
        lines: ~80
      - name: "float_ball.rs"
        contents: "FloatBallAnchor/State/Rect/Bounds, geometry fns, create/destroy/expand/snap commands"
        lines: ~320
      - name: "tray.rs"
        contents: "TrayConfig, TrayUtilization, format_tray_title, apply_tray_presentation, sync_tray_title"
        lines: ~200
      - name: "usage_query.rs"
        contents: "get_provider_data, merge_payloads, filter_buckets_to_range, get_usage_data, get_known_models"
        lines: ~400
      - name: "calendar.rs"
        contents: "get_monthly_usage_with_debug_sync, get_monthly_usage"
        lines: ~120
      - name: "period.rs"
        contents: "resolve_month_offset, first_of_next_month, compute_date_bounds, format_*_label, month_offset_from_now"
        lines: ~100
      - name: "config.rs"
        contents: "set_window_surface, set_glass_effect, set_refresh_interval, set_dock_icon_visible, set_tray_config, clear_cache, reposition_window, get_rate_limits, get_last_usage_debug, get_status_widget_summary"
        lines: ~180

  rate_limits_rs:
    target: "src-tauri/src/rate_limits/"
    modules:
      - name: "mod.rs"
        contents: "RateLimitFetchError, RateLimitSelection, merge fns, fetch_selected_rate_limits, public API"
        lines: ~150
      - name: "claude.rs"
        contents: "OAuth, API types, fetch_claude_rate_limits, plan detection"
        lines: ~250
      - name: "claude_cli.rs"
        contents: "CLI path resolution, probe, parse_claude_cli_rate_limit_info"
        lines: ~330
      - name: "codex.rs"
        contents: "Codex types, extract_codex_rate_limits, find_newest_jsonl"
        lines: ~140
      - name: "http.rs"
        contents: "Header parsing, cooldown_metadata, retry_after, merge utilities"
        lines: ~110
