ecl_version: "1.0"
feature: "file-reorganization"
status: completed
created: 2026-03-25
updated: 2026-03-25

summary: >
  Reorganize TokenMonitor codebase by functional domain.
  Rust backend: group flat .rs files into usage/, stats/, tray/ subdirectories.
  Frontend: group loose .ts files into tray/, window/, views/ subdirectories.
  Archive: MCP modules, old planning docs, debug tools, ccusage/.

requirements:
  - id: REQ-001
    text: "Rust backend: group usage pipeline files into usage/ subdirectory"
    status: verified
    confidence: 0.95
    details: "parser.rs, pricing.rs, integrations.rs → usage/"
    acceptance_criteria:
      - "usage/mod.rs re-exports all three submodules"
      - "All crate::parser/pricing/integrations paths updated to crate::usage::*"
      - "cargo check passes with 0 warnings"
      - "cargo test passes (all 191 tests)"

  - id: REQ-002
    text: "Rust backend: group statistics files into stats/ subdirectory"
    status: verified
    confidence: 0.95
    details: "change_stats.rs → stats/change.rs, subagent_stats.rs → stats/subagent.rs"
    acceptance_criteria:
      - "stats/mod.rs re-exports both submodules"
      - "All crate::change_stats/subagent_stats paths updated to crate::stats::*"
      - "cargo check passes"

  - id: REQ-003
    text: "Rust backend: group tray rendering into tray/ subdirectory"
    status: verified
    confidence: 0.95
    details: "tray_render.rs → tray/render.rs"
    acceptance_criteria:
      - "tray/mod.rs re-exports render module"
      - "All crate::tray_render paths updated to crate::tray::render"
      - "cargo check passes"

  - id: REQ-004
    text: "Frontend: group tray-related files into lib/tray/"
    status: verified
    confidence: 0.95
    details: "traySync.ts → tray/sync.ts, trayTitle.ts → tray/title.ts (with tests)"
    acceptance_criteria:
      - "All imports updated across App.svelte, bootstrap.ts, Settings.svelte"
      - "npm test passes"

  - id: REQ-005
    text: "Frontend: group window management into lib/window/"
    status: verified
    confidence: 0.95
    details: "windowAppearance.ts → window/appearance.ts, windowSizing.ts → window/sizing.ts"
    acceptance_criteria:
      - "All imports updated in App.svelte, bootstrap.ts, Settings.svelte"
      - "npm test passes"

  - id: REQ-006
    text: "Frontend: group view logic into lib/views/"
    status: verified
    confidence: 0.95
    details: "rateLimitsView.ts, rateLimitMonitor.ts, footerView.ts → views/"
    acceptance_criteria:
      - "All imports updated across consumer files"
      - "npm test passes"

  - id: REQ-007
    text: "Frontend: consolidate utils by moving calendar-utils into utils/"
    status: verified
    confidence: 0.95
    details: "calendar-utils.ts → utils/calendar.ts, calendar.test.ts → utils/calendar.test.ts"
    acceptance_criteria:
      - "Calendar.svelte import updated"
      - "npm test passes"

  - id: REQ-008
    text: "Archive MCP modules (4 .rs files not wired into lib.rs)"
    status: verified
    confidence: 1.0
    details: "detect.rs, mcp_process.rs, mcp_client.rs, mcp_adapter.rs → archive/mcp/"
    acceptance_criteria:
      - "Files moved, no compilation impact (not in mod tree)"
      - "cargo check still passes"

  - id: REQ-009
    text: "Archive old planning documents (6 .md files)"
    status: verified
    confidence: 1.0
    details: "docs/2026-03-21-*.md + design-change-stats.md → archive/docs/"
    acceptance_criteria:
      - "No code impact"

  - id: REQ-010
    text: "Archive debug tools (resizeDebug + ResizeDebugOverlay)"
    status: verified
    confidence: 0.8
    risk: high
    details: >
      resizeDebug.ts has 100+ call sites across 8 files.
      Must remove all imports, function calls, and component references.
      Affected: App.svelte, stores/usage.ts, stores/settings.ts,
      Calendar.svelte, Settings.svelte, windowAppearance.ts,
      plus test mocks in settings.test.ts, usage.test.ts, windowAppearance.test.ts
    acceptance_criteria:
      - "All resizeDebug imports and calls removed"
      - "ResizeDebugOverlay component removed from App.svelte"
      - "Test mocks for resizeDebug removed"
      - "npm test passes"
      - "svelte-check passes"

  - id: REQ-011
    text: "Archive ccusage/ directory"
    status: verified
    confidence: 1.0
    details: "Independent project, not part of TokenMonitor build"
    acceptance_criteria:
      - "Directory moved to archive/ccusage/"

  - id: REQ-012
    text: "Keep root-level files unchanged"
    status: verified
    confidence: 1.0
    details: >
      main.rs, lib.rs (update mod declarations only),
      commands.rs, models.rs, rate_limits.rs stay at root.
      Frontend: bootstrap.ts, providerMetadata.ts stay at lib/ root.

confrontation:
  red_team:
    - id: ATK-001
      scenario: "resizeDebug removal breaks production debugging capability"
      severity: medium
    - id: ATK-002
      scenario: "Rust mod path changes break tests that import specific paths"
      severity: low
    - id: ATK-003
      scenario: "Frontend import path changes miss edge cases in Svelte components"
      severity: medium
  blue_team:
    - attack: ATK-001
      verdict: mitigated
      mitigation: "Files preserved in archive/debug/ for future restoration. console.log can replace critical debug points."
    - attack: ATK-002
      verdict: defended
      mitigation: "Rust tests use crate:: paths which will be updated. cargo test verifies all."
    - attack: ATK-003
      verdict: defended
      mitigation: "svelte-check + npm test catch all broken imports at compile time."

dependency_graph:
  REQ-008: []              # Archive MCP (no deps, safe first step)
  REQ-009: []              # Archive docs (no deps)
  REQ-011: []              # Archive ccusage (no deps)
  REQ-010: []              # Archive debug (independent, but invasive)
  REQ-002: []              # Rust stats/ (leaf modules, no internal deps)
  REQ-001: [REQ-002]       # Rust usage/ (parser depends on stats)
  REQ-003: []              # Rust tray/ (only depends on commands)
  REQ-007: []              # Frontend utils/calendar
  REQ-004: []              # Frontend tray/
  REQ-005: [REQ-010]       # Frontend window/ (windowAppearance imports resizeDebug)
  REQ-006: []              # Frontend views/
  REQ-012: [REQ-001, REQ-002, REQ-003]  # Update lib.rs mod declarations last

implementation_order:
  wave_1_parallel:
    - REQ-008  # Archive MCP
    - REQ-009  # Archive docs
    - REQ-011  # Archive ccusage
    - REQ-010  # Archive debug (remove all references first, then move files)
  wave_2_parallel:
    - REQ-002  # Rust stats/
    - REQ-003  # Rust tray/
    - REQ-007  # Frontend utils/calendar
    - REQ-004  # Frontend tray/
    - REQ-006  # Frontend views/
  wave_3:
    - REQ-001  # Rust usage/ (after stats/ is done, parser paths change)
    - REQ-005  # Frontend window/ (after debug removal)
  wave_4:
    - REQ-012  # Update lib.rs, final verification
