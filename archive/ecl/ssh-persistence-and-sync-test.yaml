ecl_version: "1.0"
feature: "ssh-persistence-and-sync-test"
status: completed
created: 2026-03-29
updated: 2026-03-29

prompt_calibration:
  raw_input: "能够自动持久化的ssh服务器的选择，还有在sync的时候自动返回test的结果"
  intent_decomposition:
    total_intents: 2
    total_tracks: 1
    tracks:
      - track_id: T1
        name: "SSH persistence + sync-with-test"
        priority: 1
        intents:
          - raw: "能够自动持久化的ssh服务器的选择"
            type: feature
          - raw: "在sync的时候自动返回test的结果"
            type: feature
  tracks:
    T1:
      calibrated_scenario: |
        1. SSH host 选择（alias + enabled 状态）通过前端 Settings store
           持久化到 settings.json，应用启动时自动恢复到后端 AppState。
        2. sync_ssh_host 命令在执行同步前先运行 test_connection，
           连接失败则跳过同步并返回带诊断信息的错误；成功则继续同步，
           返回结果包含 test 状态和同步记录数。

requirements:
  # ── Persistence ────────────────────────────────────────────────
  - id: REQ-001
    text: "SSH host 选择在应用重启后保留"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "settings.json 中存在 sshHosts 数组"
      - "应用启动时读取 sshHosts 并推送到 Rust AppState"
      - "add/remove/toggle 操作后自动保存到 settings.json"
    decomposition:
      features: [FEAT-001, FEAT-002, FEAT-003]

  # ── Sync with pre-test ────────────────────────────────────────
  - id: REQ-002
    text: "sync 操作前自动测试连接并返回结果"
    status: verified
    confidence: 0.90
    acceptance_criteria:
      - "sync_ssh_host 返回结构包含 test_result 字段"
      - "test 失败时不执行 sync，返回 test 错误信息"
      - "test 成功后执行 sync，返回 test 耗时 + 同步记录数"
      - "后台自动同步也遵循 pre-test 逻辑"
    decomposition:
      features: [FEAT-004, FEAT-005]

features:
  - id: FEAT-001
    name: "Settings store 加 sshHosts 字段"
    parent: REQ-001
    modules: [MOD-001]
    dependencies: []
    complexity: small
    description: |
      在 Settings interface 中添加 sshHosts: SshHostConfig[]，
      DEFAULTS 为空数组，加 normalize 函数。

  - id: FEAT-002
    name: "启动时恢复 SSH hosts 到后端"
    parent: REQ-001
    modules: [MOD-002]
    dependencies: [FEAT-001]
    complexity: small
    description: |
      新增 Tauri command init_ssh_hosts(hosts: Vec<SshHostConfig>)，
      bootstrap.ts 在启动时调用，将持久化的 hosts 推送到 AppState。

  - id: FEAT-003
    name: "增删改操作自动持久化"
    parent: REQ-001
    modules: [MOD-003]
    dependencies: [FEAT-001]
    complexity: small
    description: |
      Settings.svelte 中 add/remove/toggle 操作后，
      同步更新 settings store 的 sshHosts 字段。

  - id: FEAT-004
    name: "sync_ssh_host 集成 pre-test"
    parent: REQ-002
    modules: [MOD-004]
    dependencies: []
    complexity: small
    description: |
      修改 sync_ssh_host 命令：先 test_connection，
      失败则返回错误；成功则继续 sync。
      返回值从 u32 改为 SshSyncResult 结构体。

  - id: FEAT-005
    name: "后台 sync 使用 pre-test 逻辑"
    parent: REQ-002
    modules: [MOD-005]
    dependencies: [FEAT-004]
    complexity: trivial
    description: |
      lib.rs 中 sync_ssh_hosts() 调用新的 pre-test sync 逻辑，
      test 失败时记录 last_error。

modules:
  - id: MOD-001
    name: "settings.ts sshHosts 字段"
    parent: FEAT-001
    file_path: "src/lib/stores/settings.ts"
    changes:
      - "Settings interface 添加 sshHosts: SshHostConfig[]"
      - "DEFAULTS 添加 sshHosts: []"
      - "normalizeSettings 添加 sshHosts normalize"

  - id: MOD-002
    name: "init_ssh_hosts Tauri command"
    parent: FEAT-002
    file_path: "src-tauri/src/commands/ssh.rs"
    changes:
      - "新增 init_ssh_hosts command"
      - "bootstrap.ts 启动时调用"

  - id: MOD-003
    name: "Settings.svelte 持久化逻辑"
    parent: FEAT-003
    file_path: "src/lib/components/Settings.svelte"
    changes:
      - "add/remove/toggle 后调用 updateSetting('sshHosts', ...)"

  - id: MOD-004
    name: "SshSyncResult + pre-test sync"
    parent: FEAT-004
    file_path: "src-tauri/src/commands/ssh.rs + ssh_remote.rs + models.rs"
    changes:
      - "新增 SshSyncResult 结构体"
      - "sync_ssh_host 先 test 再 sync"
      - "前端类型更新"

  - id: MOD-005
    name: "后台 sync 集成 pre-test"
    parent: FEAT-005
    file_path: "src-tauri/src/lib.rs"
    changes:
      - "sync_ssh_hosts 使用 cache_mgr.sync_host_with_test()"

dependency_graph:
  FEAT-001: []
  FEAT-002: [FEAT-001]
  FEAT-003: [FEAT-001]
  FEAT-004: []
  FEAT-005: [FEAT-004]

# Phase 5 (Adversarial Filtering) findings:
adversarial_findings:
  - id: FIND-001
    target: FEAT-001
    dimension: "migration"
    severity: low
    description: "已有用户的 settings.json 无 sshHosts 字段"
    resolution: "normalize 函数默认返回 []，向后兼容"

  - id: FIND-002
    target: FEAT-002
    dimension: "race condition"
    severity: medium
    description: "bootstrap 推送 hosts 和后台 sync 可能并发"
    resolution: "init_ssh_hosts 使用 write lock，sync 循环首次等待 1s"

  - id: FIND-003
    target: FEAT-004
    dimension: "performance"
    severity: medium
    description: "pre-test 增加 ~10s 最坏延迟（ConnectTimeout=10）"
    resolution: "可接受——用户手动 sync 时需要知道连接状态；后台 sync 同理"

  - id: FIND-004
    target: FEAT-004
    dimension: "error path"
    severity: low
    description: "前端需要处理新的 SshSyncResult 类型"
    resolution: "更新 TS 类型定义和 Settings.svelte sync 回调"

  - id: FIND-005
    target: FEAT-003
    dimension: "consistency"
    severity: medium
    description: "前端 sshHosts 和后端 AppState.ssh_hosts 可能不同步"
    resolution: "每次 add/remove/toggle 同时更新前后端"

# Phase 7 (Feasibility Probing):
probes:
  - target: FEAT-001
    type: assumption
    question: "Tauri plugin-store 能存储嵌套对象数组吗？"
    verdict: feasible
    evidence: "headerTabs 已经是复杂嵌套对象，sshHosts 更简单"

# Phase 8 (Red-Blue Confrontation):
confrontation:
  red_team:
    - id: ATK-001
      scenario: "用户手动编辑 settings.json 放入非法 sshHosts 数据"
      severity: low
    - id: ATK-002
      scenario: "SSH host 被删除但 settings.json 中仍有该 alias"
      severity: low
    - id: ATK-003
      scenario: "并发：用户快速点击 add 多次"
      severity: low
  blue_team:
    - attack: ATK-001
      verdict: defended
      defense: "normalize 函数过滤非法数据"
    - attack: ATK-002
      verdict: defended
      defense: "discover_ssh_hosts 返回当前可用列表，UI 显示不可用标记"
    - attack: ATK-003
      verdict: defended
      defense: "后端 add_ssh_host 已有重复检查"
