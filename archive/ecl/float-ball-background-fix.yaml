ecl_version: "1.0"
feature: "float-ball-background-fix"
status: completed
created: 2026-03-29
updated: 2026-03-29

prompt_calibration:
  raw_input: "悬浮球的背景可能出现方框"
  tracks:
    T1:
      calibrated_scenario: |
        FloatBall 窗口在 Windows 上显示一个可见的矩形背景，
        原因是 WebView2 控件的内部背景色未设为透明。
        CSS background: transparent 只影响网页层，
        WebView 控件本身需要通过 setBackgroundColor API 显式设为 RGBA(0,0,0,0)。

requirements:
  - id: REQ-001
    text: "FloatBall 窗口背景完全透明，无可见矩形"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "float-ball WebView 背景设为 RGBA(0,0,0,0)"
      - "球体以外区域完全透明，无方框"
      - "展开和收缩状态均无背景泄漏"

root_cause:
  description: |
    主窗口通过 appearance.ts 的 syncNativeWindowSurface() 调用
    getCurrentWebviewWindow().setBackgroundColor({ red:0, green:0, blue:0, alpha:0 })
    实现了 WebView 背景透明。但 float-ball.ts 入口缺少此调用，
    导致 WebView2 使用默认不透明背景，在球体周围显示矩形方框。

fix:
  approach: "在 float-ball.ts 初始化时调用 setBackgroundColor 设置 WebView 透明背景"
  files:
    - "src/float-ball.ts"
