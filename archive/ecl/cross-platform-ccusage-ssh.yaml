requirements:
  - id: REQ-001
    text: "Multi-platform support: Mac, Windows, Linux with unified system tray popover"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "App builds and runs on macOS, Windows, and Linux"
      - "System tray icon on all platforms; left-click opens popover"
      - "Windows/Linux: opaque background (no glass blur)"
      - "macOS: retains glass blur; macOS-only settings hidden on other platforms"
      - "Tray cost display: macOS uses set_title(); Windows/Linux render cost onto icon or tooltip"
    decomposition:
      features: [FEAT-E1, FEAT-E2, FEAT-E3, FEAT-E4, FEAT-E5, FEAT-E6, FEAT-E7, FEAT-E8]

  - id: REQ-002
    text: "SSH remote reading with hybrid discovery and remote preprocessing"
    status: verified
    confidence: 0.90
    acceptance_criteria:
      - "Auto-discovers hosts from ~/.ssh/config (with Include support)"
      - "Users can add/remove/enable/disable hosts in Settings"
      - "Extracted data cached at Tauri app_data_dir/remote-cache/{hostname}/"
      - "Configurable sync interval (default 5 min)"
      - "SSH v1 scope: Host, HostName, User, Port, IdentityFile (no ProxyJump/PuTTY)"
    decomposition:
      features: [FEAT-D1, FEAT-D2, FEAT-D3, FEAT-D4, FEAT-D5, FEAT-D6]

  - id: REQ-003
    text: "Replace token/pricing backend with ccusage MCP server"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "Rust spawns @ccusage/mcp as long-lived child process (stdio transport)"
      - "JSON-RPC tools/call for daily, monthly, session, blocks queries"
      - "MCP response parsed and adapted into frontend UsagePayload"
      - "MCP server always invoked with --mode auto (uses costUSD when available)"
    decomposition:
      features: [FEAT-A1, FEAT-A2, FEAT-A3, FEAT-A4, FEAT-A6, FEAT-A7]

  - id: REQ-004
    text: "Support Claude + Codex via MCP; extensible for future providers"
    status: verified
    confidence: 0.90
    decomposition:
      features: [FEAT-C1, FEAT-C2]

  - id: REQ-005
    text: "Remove rate limit functionality entirely"
    status: verified
    confidence: 0.95
    decomposition:
      features: [FEAT-B1, FEAT-B2, FEAT-B3]

  - id: REQ-006
    text: "ccusage MCP server is user-installed prerequisite"
    status: verified
    confidence: 0.95
    decomposition:
      features: [FEAT-A3, FEAT-E7]

  - id: REQ-007
    text: "Keep and complete change_stats and subagent_stats integration"
    status: verified
