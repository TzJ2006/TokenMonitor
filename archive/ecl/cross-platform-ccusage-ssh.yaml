# KEY DECISIONS
# ══════════════════════════════════════════════════════════════════════════════

decisions:
  - id: DEC-001
    text: "Use ccusage MCP server (not direct CLI subprocess) as backend"
    rationale: "Long-lived process eliminates per-query startup overhead"
    date: 2026-03-24
  - id: DEC-002
    text: "SSH uses tar streaming preserving directory structure"
    rationale: "ccusage requires projects/{project}/{session}.jsonl hierarchy"
    date: 2026-03-24
  - id: DEC-003
    text: "Remove rate limits entirely"
    rationale: "Simplifies architecture; info available via ccusage blocks CLI"
    date: 2026-03-24
  - id: DEC-004
    text: "Keep change_stats + subagent_stats via minimal JSONL reader"
    rationale: "ccusage doesn't support them; user wants these features"
    date: 2026-03-24
  - id: DEC-E1
    text: "All platforms use opaque background"
    rationale: "Removes ~350 lines of platform-specific window code"
    date: 2026-03-24
  - id: DEC-E2
    text: "Hybrid tray: macOS set_title() + all platforms set_tooltip()"
    rationale: "Windows tray icons 16-32px square; can't render readable text"
    date: 2026-03-24

