ecl_version: "1.0"
feature: "build-automation"
status: phase-9-implemented
created: 2026-03-25
updated: 2026-03-25

# ── Validated Requirements ────────────────────────────────────────────────────

requirements:
  - id: REQ-001
    text: "Produce .dmg (macOS), .exe NSIS (Windows), .deb (Linux) installers"
    status: verified
    confidence: 0.95
    source: user-stated
    acceptance_criteria:
      - "npx tauri build produces platform-native installer"
      - "CI matrix builds all 3 platforms on tag push"

  - id: REQ-002
    text: "Two variants per platform: lightweight (app only) and full (app + Node.js + ccusage)"
    status: verified
    confidence: 0.95
    source: user-stated
    acceptance_criteria:
      - "Lightweight = standard Tauri installer, user provides own Node.js + ccusage"
      - "Full = two-step: prereq installer (bundled Node.js portable + ccusage) then app installer"
      - "Prereq installer detects existing Node.js/ccusage and skips if present"

  - id: REQ-003
    text: "Build scripts live in build/, outputs go to outputs/ (gitignored)"
    status: verified
    confidence: 0.95
    source: user-stated
    acceptance_criteria:
      - "build/ contains all build automation scripts"
      - "outputs/ is in .gitignore"
      - "outputs/ organized by variant and platform"

  - id: REQ-004
    text: "Scripts work both locally (current platform only) and in GitHub Actions CI (all platforms)"
    status: verified
    confidence: 0.95
    source: user-stated
    acceptance_criteria:
      - "Local: `bash build/build.sh` produces current-platform artifacts in outputs/"
      - "CI: release.yml calls same scripts across matrix of 3 OS runners"

  - id: REQ-005
    text: "Full version works on completely offline machines"
    status: verified
    confidence: 0.90
    source: user-stated
    acceptance_criteria:
      - "Node.js portable binary bundled (no internet download needed)"
      - "@ccusage/mcp and all npm deps pre-packed (no npm install needed)"
      - "Prereq installer extracts bundled Node.js + ccusage to user-local location"

# ── Approach ──────────────────────────────────────────────────────────────────

decisions:
  - id: DEC-001
    text: "Two-step installer for full version (prereq installer + app installer, zipped together)"
    rationale: "User chose this over single embedded installer or standalone zip"
    date: 2026-03-25

  - id: DEC-002
    text: "GitHub Actions CI as primary cross-platform builder, local scripts for dev builds"
    rationale: "Tauri cannot cross-compile; macOS DMG needs macOS runner, etc."
    date: 2026-03-25

# ── Features ──────────────────────────────────────────────────────────────────

features:
  - id: FEAT-001
    name: "build/ script suite"
    parent: [REQ-003, REQ-004]
    modules: [MOD-001, MOD-002, MOD-003, MOD-004]
    dependencies: []
    complexity: medium

  - id: FEAT-002
    name: "Lightweight installer pipeline"
    parent: [REQ-001, REQ-002]
    modules: [MOD-005]
    dependencies: [FEAT-001]
    complexity: small

  - id: FEAT-003
    name: "Full installer pipeline (Node.js + ccusage bundling)"
    parent: [REQ-002, REQ-005]
    modules: [MOD-006, MOD-007, MOD-008]
    dependencies: [FEAT-001, FEAT-002]
    complexity: large

  - id: FEAT-004
    name: "CI release workflow (3-platform matrix)"
    parent: [REQ-001, REQ-004]
    modules: [MOD-009]
    dependencies: [FEAT-001, FEAT-002, FEAT-003]
    complexity: medium

# ── Modules ───────────────────────────────────────────────────────────────────

modules:
  - id: MOD-001
    name: "build/build.sh — main entry point"
    parent: FEAT-001
    description: "Detects platform, parses args (--lightweight/--full/--all), orchestrates sub-scripts"
    file_path: "build/build.sh"

  - id: MOD-002
    name: "build/build-app.sh — Tauri app builder"
    parent: FEAT-001
    description: "Runs npx tauri build, copies artifacts to outputs/lightweight/<platform>/"
    file_path: "build/build-app.sh"

  - id: MOD-003
    name: "build/download-node.sh — Node.js portable downloader"
    parent: FEAT-001
    description: "Downloads Node.js portable for specified platform to build/cache/"
    file_path: "build/download-node.sh"

  - id: MOD-004
    name: "build/bundle-ccusage.sh — ccusage offline packer"
    parent: FEAT-001
    description: "Creates offline npm pack of @ccusage/mcp with all deps"
    file_path: "build/bundle-ccusage.sh"

  - id: MOD-005
    name: "Lightweight output assembly"
    parent: FEAT-002
    description: "Copies Tauri build output to outputs/lightweight/{macos,windows,linux}/"
    file_path: "build/build-app.sh"

  - id: MOD-006
    name: "build/build-full.sh — full package assembler"
    parent: FEAT-003
    description: "Assembles app installer + prereq installer + bundled Node.js + ccusage into zip"
    file_path: "build/build-full.sh"

  - id: MOD-007
    name: "Enhanced prereq installers"
    parent: FEAT-003
    description: >
      Improve existing scripts/setup-prereqs.sh and scripts/setup-prereqs.nsi to:
      (a) accept bundled Node.js path, (b) install from bundle if offline,
      (c) detect existing installations and skip
    file_path: "build/prereq/"

  - id: MOD-008
    name: "Full package zip structure"
    parent: FEAT-003
    description: >
      Per-platform zip containing: README, prereq installer, app installer,
      node-portable/, ccusage-offline/. User runs prereq then app.
    file_path: "build/build-full.sh"

  - id: MOD-009
    name: "release.yml — 3-platform matrix CI"
    parent: FEAT-004
    description: >
      Extend release.yml from macOS-only to matrix [macos, windows, ubuntu].
      Each runner: build lightweight + full, upload all to GitHub Release.
    file_path: ".github/workflows/release.yml"

# ── Dependency Graph ──────────────────────────────────────────────────────────

dependency_graph:
  FEAT-001: []                          # build scripts (no deps)
  FEAT-002: [FEAT-001]                  # lightweight needs build scripts
  FEAT-003: [FEAT-001, FEAT-002]        # full needs build scripts + lightweight output
  FEAT-004: [FEAT-001, FEAT-002, FEAT-003]  # CI needs all scripts ready

# ── Probes ────────────────────────────────────────────────────────────────────

probes:
  - target: FEAT-003
    question: "Node.js portable download URLs and sizes per platform?"
    verdict: feasible
    evidence: >
      nodejs.org provides: node-v22.x-win-x64.zip (~30MB),
      node-v22.x-darwin-arm64.tar.gz (~25MB),
      node-v22.x-linux-x64.tar.xz (~25MB).
      All are self-contained, no system install needed.

  - target: MOD-004
    question: "Can we offline-bundle @ccusage/mcp with all deps?"
    verdict: feasible
    evidence: >
      `npm pack` creates tarball; `npm install --pack-destination` can cache deps.
      Alternative: create a temp dir, npm install @ccusage/mcp, tar the node_modules.

  - target: MOD-009
    question: "Can release.yml build Windows NSIS on windows-latest?"
    verdict: feasible
    evidence: >
      Tauri v2 NSIS bundler works on windows-latest runners.
      No code signing needed for Windows (unlike macOS).

# ── Confrontation Summary ─────────────────────────────────────────────────────

confrontation:
  red_team:
    - id: ATK-001
      scenario: "Node.js portable version mismatch with ccusage requirements"
      severity: medium
    - id: ATK-002
      scenario: "Windows prereq installer can't find bundled Node.js after extraction"
      severity: medium
    - id: ATK-003
      scenario: "macOS DMG needs signing/notarization — lightweight CI builds won't be usable without it"
      severity: high
    - id: ATK-004
      scenario: "Full zip > 100MB, GitHub Release has 2GB limit but large downloads may timeout"
      severity: low
    - id: ATK-005
      scenario: "ccusage/mcp npm package has native deps that need per-platform compilation"
      severity: medium

  blue_team:
    - attack: ATK-001
      verdict: mitigated
      mitigation: "Pin Node.js LTS version in download-node.sh. Test ccusage against that version in CI."
    - attack: ATK-002
      verdict: mitigated
      mitigation: "Use relative paths in prereq installer. Bundle node in known subfolder node-portable/."
    - attack: ATK-003
      verdict: defended
      mitigation: "macOS signing secrets already in CI. Release workflow already handles signing. Lightweight = signed DMG."
    - attack: ATK-004
      verdict: defended
      mitigation: "Expected full zip ~80MB per platform. Well within limits."
    - attack: ATK-005
      verdict: mitigated
      mitigation: "Check if @ccusage/mcp has native deps. If so, bundle per-platform. If pure JS, one bundle for all."
