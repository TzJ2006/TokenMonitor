ecl_version: "1.0"
feature: "logging-system"
status: completed
created: 2026-03-29
updated: 2026-03-29

prompt_calibration:
  raw_input: "写一个详细的logging系统，APP运行时记录log用于debug"
  intent_decomposition:
    total_intents: 1
    total_tracks: 1
    tracks:
      - track_id: T1
        name: "Runtime debug logging"
        priority: 1
        intents:
          - raw: "APP运行时记录log用于debug"
            type: feature
  tracks:
    T1:
      calibrated_scenario: |
        为 TokenMonitor (Tauri v2 + Rust + Svelte) 添加结构化运行时日志系统。
        Rust 后端使用 tracing 生态，前端通过 IPC 转发日志到 Rust 统一写文件。
        前后端日志分离输出到不同文件。按天轮转 + 保留最近 7 天。
        环境变量设置默认级别，Settings UI 可运行时覆盖。人类可读格式。
      intent_dimensions:
        task: { status: present, value: "添加运行时 debug 日志系统" }
        input: { status: implicit, value: "App 运行事件、错误、状态变化" }
        output: { status: resolved, value: "backend.log + frontend.log 文件" }
        constraints: { status: resolved, value: "跨平台, 不影响性能, 前后端分离输出" }
        context: { status: enriched, value: "Tauri v2, tracing/log crate 未在 Cargo.toml, 23处 eprintln!, 16处 console.error" }
        audience: { status: implicit, value: "开发者自己 debug 用" }
        memory: { status: present, value: "无现有日志基础设施" }
        success_criteria: { status: resolved, value: "可通过日志文件排查运行时问题, 级别可控" }
        examples: { status: deferred }

decisions:
  - id: DEC-001
    decision: "使用 tracing + tracing-subscriber + tracing-appender 生态"
    rationale: "Rust 生态标准, 支持 span 上下文, reload layer 支持运行时切换级别"
  - id: DEC-002
    decision: "前后端日志分离到 backend.log 和 frontend.log"
    rationale: "用户明确要求分开输出"
  - id: DEC-003
    decision: "按天轮转 + 保留7天 (替代按大小轮转)"
    rationale: "tracing-appender 不支持按大小轮转, 按天轮转效果相同且更简单"
  - id: DEC-004
    decision: "环境变量 TOKENMONITOR_LOG + Settings UI 双控制"
    rationale: "用户要求两者都要"

requirements:
  - id: REQ-001
    text: "Rust 后端 tracing 日志基础设施"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "App 启动时初始化 tracing subscriber"
      - "日志写入 {app_data_dir}/logs/backend.log"
      - "格式: 2026-03-29T10:30:15.123Z INFO module::path - message"
      - "默认级别 info, TOKENMONITOR_LOG 环境变量可覆盖"
    decomposition:
      features: [FEAT-001, FEAT-002, FEAT-003]

  - id: REQ-002
    text: "前端日志通过 IPC 写入独立日志文件"
    status: verified
    confidence: 0.90
    acceptance_criteria:
      - "TypeScript logger 模块支持 debug/info/warn/error 级别"
      - "日志通过 IPC 命令发送到 Rust"
      - "写入 {app_data_dir}/logs/frontend.log"
      - "格式: 2026-03-29T10:30:15.200Z INFO [category] message"
    decomposition:
      features: [FEAT-004, FEAT-005]

  - id: REQ-003
    text: "日志轮转和清理"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "按天自动创建新日志文件"
      - "自动删除超过 7 天的旧日志文件"
      - "App 启动时执行一次清理"
    decomposition:
      features: [FEAT-006]

  - id: REQ-004
    text: "运行时日志级别切换"
    status: verified
    confidence: 0.85
    acceptance_criteria:
      - "Settings UI 有 Debug Mode 开关"
      - "开启后切换到 debug 级别, 关闭恢复 info"
      - "切换立即生效, 无需重启"
      - "设置持久化到 tauri-plugin-store"
    decomposition:
      features: [FEAT-007, FEAT-008]

  - id: REQ-005
    text: "为现有代码添加有意义的日志"
    status: verified
    confidence: 0.90
    acceptance_criteria:
      - "替换所有 eprintln! 为 tracing 宏"
      - "关键流程添加 info 级别日志: 启动, JSONL解析, 定价计算, SSH同步, rate limit获取"
      - "详细信息使用 debug 级别"
      - "前端 bootstrap, store操作, IPC调用添加日志"
    decomposition:
      features: [FEAT-009, FEAT-010]

features:
  - id: FEAT-001
    name: "tracing subscriber 初始化"
    parent: REQ-001
    modules: [MOD-001]
    dependencies: []
    complexity: medium
    description: |
      在 lib.rs setup 中初始化 tracing-subscriber:
      - EnvFilter 读取 TOKENMONITOR_LOG (默认 info)
      - reload layer 支持运行时切换
      - file appender 写入 backend.log
      - 人类可读格式 (时间+级别+模块+消息)

  - id: FEAT-002
    name: "日志目录和文件管理"
    parent: REQ-001
    modules: [MOD-002]
    dependencies: []
    complexity: small
    description: |
      确保 {app_data_dir}/logs/ 目录存在。
      tracing-appender RollingFileAppender 配置为 Rotation::DAILY。

  - id: FEAT-003
    name: "非阻塞日志写入"
    parent: REQ-001
    modules: [MOD-001]
    dependencies: [FEAT-001]
    complexity: small
    description: |
      使用 tracing-appender::non_blocking() 包装文件 writer,
      确保日志写入不阻塞主线程。持有 WorkerGuard 防止丢失。

  - id: FEAT-004
    name: "前端 TypeScript logger 模块"
    parent: REQ-002
    modules: [MOD-003]
    dependencies: []
    complexity: small
    description: |
      src/lib/utils/logger.ts - 提供 logger.debug/info/warn/error(category, message)。
      内部通过 invoke('log_frontend_message', {level, category, message}) 发送到 Rust。
      支持设置当前级别 (前端过滤, 减少 IPC 开销)。

  - id: FEAT-005
    name: "Rust 端前端日志 IPC 命令"
    parent: REQ-002
    modules: [MOD-004]
    dependencies: [FEAT-001]
    complexity: small
    description: |
      Tauri command log_frontend_message(level, category, message)。
      写入独立的 frontend.log appender。

  - id: FEAT-006
    name: "旧日志文件清理"
    parent: REQ-003
    modules: [MOD-002]
    dependencies: [FEAT-002]
    complexity: small
    description: |
      App 启动时扫描 logs/ 目录, 删除超过 7 天的 .log 文件。
      简单实现: 检查文件名中的日期后缀。

  - id: FEAT-007
    name: "Settings UI debug 模式开关"
    parent: REQ-004
    modules: [MOD-005]
    dependencies: [FEAT-004]
    complexity: small
    description: |
      Settings.svelte 添加 "Debug Logging" ToggleSwitch。
      切换时调用 updateSetting + IPC 命令。

  - id: FEAT-008
    name: "运行时级别切换 IPC 命令"
    parent: REQ-004
    modules: [MOD-001, MOD-004]
    dependencies: [FEAT-001]
    complexity: medium
    description: |
      Tauri command set_log_level(level: String)。
      使用 tracing-subscriber reload::Handle 动态修改 EnvFilter。
      同时更新前端 logger 级别。

  - id: FEAT-009
    name: "Rust 代码日志插桩"
    parent: REQ-005
    modules: [MOD-006]
    dependencies: [FEAT-001]
    complexity: medium
    description: |
      替换 23 处 eprintln! 为 tracing::{info,warn,error,debug}!。
      为关键流程添加 info span: 启动, 后台刷新循环, SSH同步, 定价刷新。
      解析/计算细节用 debug 级别。

  - id: FEAT-010
    name: "前端代码日志插桩"
    parent: REQ-005
    modules: [MOD-007]
    dependencies: [FEAT-004]
    complexity: medium
    description: |
      bootstrap.ts: 记录启动流程各步骤。
      stores/usage.ts: 记录 fetch 开始/完成/错误。
      stores/rateLimits.ts: 记录 rate limit 获取。
      stores/settings.ts: 记录设置变更。

modules:
  - id: MOD-001
    name: "logging 模块 (Rust)"
    parent: FEAT-001
    file_path: "src-tauri/src/logging.rs"
    description: |
      新文件。包含:
      - init_logging(app_data_dir) → (WorkerGuard, WorkerGuard, ReloadHandle)
      - 两个 file appender (backend + frontend)
      - EnvFilter + reload layer 配置
      - set_log_level(handle, level) 函数

  - id: MOD-002
    name: "日志文件管理"
    parent: FEAT-002
    file_path: "src-tauri/src/logging.rs"
    description: "日志目录创建 + 旧文件清理逻辑, 同在 logging.rs"

  - id: MOD-003
    name: "前端 logger"
    parent: FEAT-004
    file_path: "src/lib/utils/logger.ts"
    description: |
      新文件。导出 logger 对象:
      - logger.debug(category, message)
      - logger.info(category, message)
      - logger.warn(category, message)
      - logger.error(category, message)
      - logger.setLevel(level)

  - id: MOD-004
    name: "日志 IPC 命令"
    parent: FEAT-005
    file_path: "src-tauri/src/commands/logging.rs"
    description: |
      新文件。Tauri commands:
      - log_frontend_message(level, category, message)
      - set_log_level(level)
      - get_log_dir() → String

  - id: MOD-005
    name: "Settings UI 集成"
    parent: FEAT-007
    file_path: "src/lib/components/Settings.svelte"
    description: "在现有 Settings 组件中添加 Debug Logging 开关"

  - id: MOD-006
    name: "Rust 插桩"
    parent: FEAT-009
    file_path: "(多个现有 .rs 文件)"
    description: "替换 eprintln! 并添加 tracing 宏到现有 Rust 模块"

  - id: MOD-007
    name: "前端插桩"
    parent: FEAT-010
    file_path: "(多个现有 .ts/.svelte 文件)"
    description: "在 bootstrap, stores, IPC 调用处添加 logger 调用"

probes:
  - target: FEAT-001
    type: assumption
    question: "tracing-appender 支持按天轮转吗?"
    method: dependency-check
    result: "是, Rotation::DAILY 支持。但不支持按大小轮转。"
    verdict: feasible

  - target: FEAT-008
    type: assumption
    question: "tracing-subscriber reload layer 能动态修改 EnvFilter 吗?"
    method: docs-check
    result: "是, tracing_subscriber::reload::Layer 提供 modify() 方法可热更新 filter。"
    verdict: feasible

  - target: FEAT-003
    type: assumption
    question: "tracing-appender non_blocking 是否需要持有 WorkerGuard?"
    method: docs-check
    result: "是, WorkerGuard 被 drop 时 flush 并关闭 writer。必须在 app 生命周期内持有。"
    verdict: feasible

confrontation:
  red_team:
    - id: ATK-001
      scenario: "日志写入阻塞主线程导致 UI 卡顿"
      severity: high
    - id: ATK-002
      scenario: "WorkerGuard 提前 drop 导致日志丢失"
      severity: high
    - id: ATK-003
      scenario: "前端高频日志导致 IPC 洪泛"
      severity: medium
    - id: ATK-004
      scenario: "敏感数据 (API key, token) 被写入日志"
      severity: high
    - id: ATK-005
      scenario: "日志文件无限增长占满磁盘"
      severity: medium
  blue_team:
    - attack: ATK-001
      verdict: defended
      mitigation: "tracing-appender::non_blocking() 使用后台线程写入, 主线程只做 channel send"
    - attack: ATK-002
      verdict: mitigated
      mitigation: "WorkerGuard 存储在 AppState 中 (Tauri managed state), 生命周期与 app 一致"
    - attack: ATK-003
      verdict: mitigated
      mitigation: "前端 logger 在发送前过滤级别, debug 模式关闭时只发 warn+error, 大幅减少 IPC"
    - attack: ATK-004
      verdict: mitigated
      mitigation: "日志插桩时只记录元数据 (model name, session count, timing), 从不记录 token/key 值"
    - attack: ATK-005
      verdict: defended
      mitigation: "按天轮转 + 启动时清理 7 天前的文件"

dependency_graph:
  FEAT-001: []                      # tracing subscriber (独立, 最先)
  FEAT-002: []                      # 日志目录 (独立, 最先)
  FEAT-003: [FEAT-001]              # 非阻塞 (依赖 subscriber)
  FEAT-004: []                      # 前端 logger (独立)
  FEAT-005: [FEAT-001]              # 前端 IPC (依赖 subscriber)
  FEAT-006: [FEAT-002]              # 旧文件清理 (依赖目录)
  FEAT-007: [FEAT-004, FEAT-008]    # Settings UI (依赖 logger + level switch)
  FEAT-008: [FEAT-001]              # 级别切换 (依赖 reload handle)
  FEAT-009: [FEAT-001]              # Rust 插桩 (依赖 subscriber)
  FEAT-010: [FEAT-004]              # 前端插桩 (依赖 logger)

implementation_order:
  phase_1_parallel:
    - FEAT-001  # tracing subscriber
    - FEAT-002  # 日志目录
    - FEAT-004  # 前端 logger 模块
  phase_2_parallel:
    - FEAT-003  # 非阻塞写入
    - FEAT-005  # 前端 IPC 命令
    - FEAT-006  # 旧文件清理
    - FEAT-008  # 级别切换 IPC
  phase_3_parallel:
    - FEAT-007  # Settings UI
    - FEAT-009  # Rust 插桩
    - FEAT-010  # 前端插桩

new_dependencies:
  cargo:
    - "tracing = \"0.1\""
    - "tracing-subscriber = { version = \"0.3\", features = [\"env-filter\", \"fmt\", \"json\"] }"
    - "tracing-appender = \"0.2\""
  npm: []  # 前端无新依赖, 通过 Tauri IPC 实现

files_to_create:
  - src-tauri/src/logging.rs
  - src-tauri/src/commands/logging.rs
  - src/lib/utils/logger.ts

files_to_modify:
  - src-tauri/Cargo.toml           # 添加 tracing-subscriber, tracing-appender
  - src-tauri/src/lib.rs           # 初始化 logging, 持有 guards
  - src-tauri/src/commands.rs      # 注册新 commands, AppState 添加 guards
  - src-tauri/src/commands/ssh.rs  # 替换 eprintln! (示例)
  - src-tauri/src/usage/ccusage.rs # 替换 eprintln!
  - src-tauri/src/rate_limits/mod.rs # 替换 eprintln!
  - src/lib/components/Settings.svelte # 添加 debug toggle
  - src/lib/stores/settings.ts     # 添加 debugLogging 设置项
  - src/lib/bootstrap.ts           # 添加启动日志
  - src/lib/stores/usage.ts        # 添加 fetch 日志
  - src/lib/stores/rateLimits.ts   # 添加 rate limit 日志
