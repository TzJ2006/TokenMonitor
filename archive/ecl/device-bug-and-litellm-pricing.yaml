# ── T2: Duke Server Sync Bug ─────────────────────────────────────────────────

requirements:
  # T2 Requirements
  - id: REQ-001
    track: T2
    text: "Empty SSH devices must still appear in DevicesView with $0.00 and status indicator"
    status: verified
    confidence: 0.95
    root_cause: |
      ssh.rs:184-186 skips devices with empty cached records via `if records.is_empty() { continue; }`.
      This hides the device entirely from the UI even though it's configured and enabled.
    acceptance_criteria:
      - "All enabled SSH hosts appear in DevicesView regardless of data"
      - "Devices with 0 records show 'No data synced' or similar indicator"
      - "Devices with data show cost breakdown as before"
    decomposition:
      features: [FEAT-001]

  - id: REQ-002
    track: T2
    text: "Sync should return diagnostic info when 0 records found"
    status: verified
    confidence: 0.90
    acceptance_criteria:
      - "SshSyncResult includes a diagnostic field explaining why 0 records"
      - "UI displays diagnostic message for failed syncs"
    decomposition:
      features: [FEAT-002]

  # T3 Requirements
  - id: REQ-003
    track: T3
    text: "Fetch model pricing from LiteLLM GitHub on startup, cache for 24h"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "On startup, if cache is >24h or missing, fetch from LiteLLM"
      - "Cache pricing JSON locally in app data directory"
      - "Fallback to hardcoded pricing.rs rates on fetch failure"
      - "Never block startup — async fetch with graceful degradation"
    decomposition:
      features: [FEAT-003, FEAT-004]

  - id: REQ-004
    track: T3
    text: "Dynamic pricing lookup replaces hardcoded rates as primary source"
    status: verified
    confidence: 0.90
    acceptance_criteria:
      - "get_rates_for_key() checks dynamic cache first, hardcoded second"
      - "LiteLLM per-token prices correctly converted to per-MTok"
      - "Cache write multipliers derived from LiteLLM fields"
      - "All existing tests still pass with hardcoded fallback"
    decomposition:
      features: [FEAT-005]

features:
  # T2 Features
  - id: FEAT-001
    name: "Show empty devices in DevicesView"
    parent: REQ-001
    modules: [MOD-001]
    dependencies: []
    complexity: small
    files:
      - src-tauri/src/commands/ssh.rs  # Remove `continue` on empty records

  - id: FEAT-002
    name: "Sync diagnostics for empty results"
    parent: REQ-002
    modules: [MOD-002]
    dependencies: []
    complexity: small
    files:
      - src-tauri/src/usage/ssh_remote.rs  # Add diagnostic to extraction script
      - src-tauri/src/commands/ssh.rs  # Forward diagnostic in SshSyncResult

  # T3 Features
  - id: FEAT-003
    name: "LiteLLM pricing fetcher"
    parent: REQ-003
    modules: [MOD-003]
    dependencies: []
    complexity: medium
    files:
      - src-tauri/src/usage/litellm.rs  # New: fetch + parse + cache

  - id: FEAT-004
    name: "Startup pricing refresh"
    parent: REQ-003
    modules: [MOD-004]
    dependencies: [FEAT-003]
    complexity: small
    files:
      - src-tauri/src/lib.rs  # Trigger fetch on startup

  - id: FEAT-005
    name: "Dynamic pricing integration"
    parent: REQ-004
    modules: [MOD-005]
    dependencies: [FEAT-003]
    complexity: medium
    files:
      - src-tauri/src/usage/pricing.rs  # Add dynamic lookup before hardcoded

modules:
  - id: MOD-001
    name: "Device list with empty entries"
    parent: FEAT-001
    changes:
      - file: src-tauri/src/commands/ssh.rs
        description: |
          In get_device_usage(), remove the `if records.is_empty() { continue; }`
          guard. Instead, always push a DeviceSummary for each enabled host.
          Empty devices get total_cost: 0.0 and empty model_breakdown.

  - id: MOD-002
    name: "Extraction script diagnostics"
    parent: FEAT-002
    changes:
      - file: src-tauri/src/usage/ssh_remote.rs
        description: |
          Modify build_extraction_script() to output a diagnostic prefix line
          like "FILES_FOUND=3 EXTRACTOR=jq" before the data lines.
          Parse this in fetch_remote_usage() and include in sync result.

  - id: MOD-003
    name: "LiteLLM pricing fetch and cache"
    parent: FEAT-003
    changes:
      - file: src-tauri/src/usage/litellm.rs
        description: |
          New module. Functions:
          - fetch_litellm_pricing() -> async fetches JSON from GitHub raw URL
          - parse_litellm_json() -> extracts relevant models (anthropic/openai)
          - load_cached_pricing() -> reads from {app_data}/pricing-cache.json
          - save_pricing_cache() -> writes cache with timestamp
          - should_refresh() -> true if cache is >24h or missing
          - DynamicModelRates struct with input/output/cache fields

  - id: MOD-004
    name: "Startup pricing trigger"
    parent: FEAT-004
    changes:
      - file: src-tauri/src/lib.rs
        description: |
          In the app setup, after initializing state:
          1. Check if pricing cache needs refresh (>24h)
          2. If yes, spawn async task to fetch and cache
          3. Store dynamic pricing in AppState (RwLock<Option<HashMap>>)

  - id: MOD-005
    name: "Dynamic pricing lookup"
    parent: FEAT-005
    changes:
      - file: src-tauri/src/usage/pricing.rs
        description: |
          Add calculate_cost_dynamic() that:
          1. Checks dynamic pricing cache (HashMap) first
          2. If found, uses LiteLLM rates (already converted to per-MTok)
          3. If not found, falls back to hardcoded get_rates_for_key()
          Existing tests unchanged (test hardcoded path).

probe_assessment:
  - target: FEAT-003
    type: assumption
    question: "Can reqwest fetch from raw.githubusercontent.com without auth?"
    verdict: feasible
    evidence: "reqwest already in Cargo.toml. GitHub raw URLs are public, no auth needed."

  - target: FEAT-005
    type: assumption
    question: "LiteLLM JSON uses per-token pricing, not per-MTok?"
    verdict: feasible
    evidence: |
      Confirmed: input_cost_per_token is per-single-token (e.g., 0.000003 = $3/MTok).
      Multiply by 1_000_000 to convert to existing per-MTok format.

  - target: FEAT-003
    type: assumption
    question: "LiteLLM has cache_creation and cache_read fields?"
    verdict: feasible
    evidence: |
      Confirmed fields: cache_creation_input_token_cost (5m),
      cache_creation_input_token_cost_above_1hr (1h),
      cache_read_input_token_cost (read). Maps directly to ModelRates.

confrontation:
  red_team:
    - id: ATK-001
      scenario: "Network failure on first launch — no cache, no LiteLLM"
      severity: medium
    - id: ATK-002
      scenario: "LiteLLM JSON schema changes — fields renamed or removed"
      severity: medium
    - id: ATK-003
      scenario: "1.33MB download on metered/slow connection"
      severity: low
    - id: ATK-004
      scenario: "Concurrent access to pricing cache file"
      severity: low
  blue_team:
    - attack: ATK-001
      verdict: defended
      defense: "Hardcoded rates in pricing.rs serve as permanent fallback. No degradation."
    - attack: ATK-002
      verdict: mitigated
      mitigation: "Use Option<f64> for all LiteLLM fields. Missing fields → skip model → hardcoded fallback."
    - attack: ATK-003
      verdict: defended
      defense: "Fetch is async background task, never blocks startup or UI. User sees cached/hardcoded data immediately."
    - attack: ATK-004
      verdict: defended
      defense: "Single writer (startup task). Readers use in-memory HashMap, not file."

dependency_graph:
  FEAT-001: []        # Independent — can start immediately
  FEAT-002: []        # Independent — can start immediately
  FEAT-003: []        # Independent — can start immediately
  FEAT-004: [FEAT-003]  # Needs fetcher module first
  FEAT-005: [FEAT-003]  # Needs parsed pricing data

decisions:
  - id: DEC-001
    decision: "Use in-memory HashMap<String, DynamicModelRates> for runtime lookup, backed by file cache"
    rationale: "Consistent with existing Mutex<HashMap> caching pattern in parser.rs. File cache only for persistence across restarts."
  - id: DEC-002
    decision: "Filter LiteLLM models by litellm_provider = anthropic|openai and mode = chat|responses"
    rationale: "Only these providers are relevant. Reduces 2598 entries to ~50-100."
  - id: DEC-003
    decision: "Keep hardcoded pricing.rs unchanged as permanent fallback"
    rationale: "Zero-regression guarantee. Dynamic pricing is additive, not replacement."
