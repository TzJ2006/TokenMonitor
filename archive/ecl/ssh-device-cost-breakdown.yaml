# ══════════════════════════════════════════════════════════════════════════════
# RISK REGISTER
# ══════════════════════════════════════════════════════════════════════════════

risks:
  - id: RISK-001
    description: "Windows OpenSSH 行为差异"
    severity: medium
    mitigation: |
      Windows 11 自带 OpenSSH。ssh -o BatchMode=yes 行为一致。
      路径分隔符：ssh 命令内使用 Unix 路径（远程是 Linux/macOS）。
      ~/.ssh/config 在 Windows 上为 C:\Users\<user>\.ssh\config。

  - id: RISK-002
    description: "远程 JSONL 文件量大，首次同步慢"
    severity: medium
    mitigation: |
      mtime-based 过滤：仅同步最近文件。
      Settings UI 显示同步进度。
      首次可选择只同步最近 N 天数据。

  - id: RISK-003
    description: "SSH key passphrase 阻塞"
    severity: low
    mitigation: |
      用户已确认使用无密码密钥。
      BatchMode=yes 在遇到交互提示时直接失败，不阻塞。
      错误信息提示用户确保 ssh-agent 已加载密钥。

  - id: RISK-004
    description: "远程机器 Claude 版本不同，JSONL 格式差异"
    severity: low
    mitigation: |
      现有 parser 已经处理多种 JSONL 格式（跳过无法解析的行）。
      远程数据使用相同的 parser 逻辑。

# ══════════════════════════════════════════════════════════════════════════════
# DECISIONS
# ══════════════════════════════════════════════════════════════════════════════

decisions:
  - id: DEC-001
    text: "Shell-out to ssh 而非 Rust SSH 库"
    rationale: |
      复用 ~/.ssh/config + ssh-agent + ProxyJump。零新依赖。
      tokio::process 已在 Cargo.toml 中。

  - id: DEC-002
    text: "新增独立 Devices Tab 而非嵌入现有 Breakdown"
    rationale: "用户明确选择。设备维度是新的聚合维度，不同于 provider 维度。"

  - id: DEC-003
    text: "本地设备也显示在 Devices Tab 中（标记为 Local）"
    rationale: "统一视图，便于对比本地与远程费用。"

  - id: DEC-004
    text: "远程缓存用 app_data_dir 而非 home dir"
    rationale: "跨平台标准路径。Windows 友好。"

  - id: DEC-005
    text: "同步策略：串行逐 host，非并行"
    rationale: "避免 SSH 连接风暴。3-5 台机器串行延迟可接受。"
