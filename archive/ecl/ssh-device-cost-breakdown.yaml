# ══════════════════════════════════════════════════════════════════════════════
# ARCHITECTURE DECISION
# ══════════════════════════════════════════════════════════════════════════════

selected_approach: "shell-out-ssh-with-local-cache"
approach_description: |
  使用系统 ssh/scp 命令（非 Rust SSH 库）读取远程数据。

  优势:
  - 复用用户 ~/.ssh/config（aliases, ports, keys, ProxyJump）
  - tokio::process 已在依赖中
  - 零新 Rust 依赖
  - 跨平台（OpenSSH 在 macOS/Win/Linux 均可用）

  数据流:
  ssh <host> "find ~/.claude/projects/ -name '*.jsonl'"
    → 对比本地缓存，确定需要下载的文件
    → ssh <host> "tar -cf - -C ~/.claude/projects <files>"
    → 解压到 {app_data_dir}/remote-cache/{hostname}/
    → 用现有 parser + pricing 解析（附加 device 标签）
    → IPC → 前端 Devices Tab

# ══════════════════════════════════════════════════════════════════════════════
# FEATURES
# ══════════════════════════════════════════════════════════════════════════════

features:
  # ── Backend: SSH + Cache ──

  - id: FEAT-01
    name: "SSH config 解析"
    parent: REQ-001
    complexity: medium
    dependencies: []
    description: |
      解析 ~/.ssh/config：Host, HostName, User, Port, IdentityFile。
      处理 Include 指令。跨平台 ~ 路径展开。
      返回 Vec<SshHost> 用于 Settings UI 的自动发现。
    file: "src-tauri/src/usage/ssh_config.rs"

  - id: FEAT-02
    name: "SSH 远程文件发现与传输"
    parent: REQ-001
    complexity: large
    dependencies: [FEAT-01]
    description: |
      通过 tokio::process::Command 执行:
      1. ssh -o BatchMode=yes <host> echo ok    # 测试连接
      2. ssh <host> "find ~/.claude/projects/ -name '*.jsonl' -newer <timestamp>"  # 发现新文件
      3. ssh <host> "tar -cf - -C ~/.claude/projects <files>"  # 传输
      处理：连接超时（10s）、认证失败、主机不可达。
    file: "src-tauri/src/usage/ssh_remote.rs"

  - id: FEAT-03
    name: "本地缓存管理"
    parent: REQ-001
    complexity: medium
    dependencies: [FEAT-02]
    description: |
      缓存目录：{app_data_dir}/remote-cache/{hostname}/projects/...
      跟踪 last-sync 时间戳 per host。
      增量同步：仅传输 mtime > last-sync 的文件。
      解压 tar 到缓存目录保留目录结构。
    file: "src-tauri/src/usage/ssh_cache.rs"

  # ── Settings UI ──

  - id: FEAT-04
    name: "SSH 主机管理 Settings UI"
    parent: REQ-002
    complexity: medium
    dependencies: [FEAT-01, FEAT-02]
    description: |
      Settings.svelte 新增 "Remote Devices" 区域:
      - 自动从 ~/.ssh/config 发现可用 hosts
      - 手动添加 host alias
      - 每个 host：enable/disable toggle + test connection 按钮
      - 全局同步间隔配置
      新增 IPC commands: get_ssh_hosts, add_ssh_host, remove_ssh_host,
      test_ssh_connection, set_ssh_sync_interval
    file: "src/lib/components/Settings.svelte"

  # ── Data Model + IPC ──

  - id: FEAT-05
    name: "Parser + 数据模型扩展"
    parent: REQ-003
    complexity: medium
    dependencies: [FEAT-03]
    description: |
      扩展 ParsedEntry：device: Option<String>。
      解析远程缓存文件时，从目录路径提取 hostname 作为 device。
      新增聚合逻辑：按 device 分组后计算模型费用。
      新增 Rust 类型：DeviceSummary, DeviceUsagePayload。
    files:
      - "src-tauri/src/usage/parser.rs"
      - "src-tauri/src/models.rs"

  - id: FEAT-06
    name: "新 IPC command: get_device_usage"
    parent: REQ-003
    complexity: medium
    dependencies: [FEAT-05]
    description: |
      get_device_usage(period, offset) → DeviceUsagePayload
      返回包含所有设备（local + remote hosts）的费用汇总。
      每个设备含：device_name, total_cost, model_breakdown[]。
      前端类型：DeviceSummary, DeviceUsagePayload。
    files:
      - "src-tauri/src/commands/usage_query.rs"
      - "src/lib/types/index.ts"

  # ── Frontend: Devices Tab ──

  - id: FEAT-07
    name: "Devices Tab UI"
    parent: REQ-003
    complexity: large
    dependencies: [FEAT-06]
    description: |
      新增 Devices Tab 与 All/Claude/Codex 同级:
      - 设备列表（卡片式），每个卡片显示：
        - 设备名 + 总费用
        - 模型明细："Opus 4.6 -- server1: $X.XX"
        - token 统计
      - 图表：按设备着色的堆叠柱状图
      - 包含 "Local" 设备代表本机数据
      新增组件：DevicesView.svelte
    files:
      - "src/lib/components/DevicesView.svelte"
      - "src/App.svelte"
      - "src/lib/stores/usage.ts"

  # ── Background Sync ──

  - id: FEAT-08
    name: "后台同步调度"
    parent: REQ-004
    complexity: medium
    dependencies: [FEAT-02, FEAT-03]
    description: |
      扩展 lib.rs background_loop:
      - 每 N 分钟（可配置）遍历已启用的 SSH hosts
      - 依次（非并行，避免 SSH 连接风暴）调用 ssh_remote::sync_host()
      - 失败时记录错误，跳过该 host，继续下一个
      - 全部完成后 invalidate parser cache + emit data-updated
    file: "src-tauri/src/lib.rs"

