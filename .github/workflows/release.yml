name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.6.0)'
        required: true

jobs:
  # ── Build on each platform ───────────────────────────────────────────────────
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: arm64
          - os: windows-latest
            platform: windows
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
    runs-on: ${{ matrix.os }}
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}

    steps:
      - uses: actions/checkout@v6

      # ── Linux system dependencies ──────────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # ── Caches ─────────────────────────────────────────────────────────────
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Node deps
        run: npm ci

      # ── Version consistency check (run on one platform only) ───────────────
      - name: Version consistency check
        if: matrix.platform == 'linux'
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          TAG="${TAG#v}"
          CARGO_VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAURI_VERSION=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          NPM_VERSION=$(node -p "require('./package.json').version")

          FAIL=0
          if [ "$CARGO_VERSION" != "$TAG" ]; then
            echo "::error::src-tauri/Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG)"
            FAIL=1
          fi
          if [ "$TAURI_VERSION" != "$TAG" ]; then
            echo "::error::src-tauri/tauri.conf.json version ($TAURI_VERSION) does not match tag ($TAG)"
            FAIL=1
          fi
          if [ "$NPM_VERSION" != "$TAG" ]; then
            echo "::error::package.json version ($NPM_VERSION) does not match tag ($TAG)"
            FAIL=1
          fi
          exit $FAIL

      # ── macOS code signing setup (skipped if secrets not configured) ────────
      - name: Set up ephemeral keychain
        if: matrix.platform == 'macos' && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          P12_PATH="$RUNNER_TEMP/certificate.p12"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$P12_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          curl -fsSL "https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer" \
            -o "$RUNNER_TEMP/DeveloperIDG2CA.cer"
          security import "$RUNNER_TEMP/DeveloperIDG2CA.cer" \
            -k "$KEYCHAIN_PATH" -T /usr/bin/codesign 2>/dev/null || true

          security import "$P12_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Write API key
        if: matrix.platform == 'macos' && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
        run: |
          P8_PATH="$RUNNER_TEMP/apikey.p8"
          echo "$APPLE_API_KEY_CONTENT" > "$P8_PATH"
          echo "APPLE_API_KEY_PATH=$P8_PATH" >> "$GITHUB_ENV"

      # ── Set up updater signing key ──────────────────────────────────────
      - name: Set up updater signing key
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$RAW_KEY" ]; then
            echo "::notice::No TAURI_SIGNING_PRIVATE_KEY set — updater signing disabled"
            exit 0
          fi
          if [[ "$RAW_KEY" == untrusted\ comment:* ]]; then
            FINAL_KEY="$RAW_KEY"
          else
            FINAL_KEY="$(printf 'untrusted comment: minisign secret key\n%s' "$RAW_KEY")"
            echo "::notice::Prepended missing comment line to TAURI_SIGNING_PRIVATE_KEY"
          fi
          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<SIGNING_KEY_EOF"
            echo "$FINAL_KEY"
            echo "SIGNING_KEY_EOF"
          } >> "$GITHUB_ENV"
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$RAW_PASSWORD" >> "$GITHUB_ENV"

      # ── Build installers ───────────────────────────────────────────────────
      - name: Build installers (macOS — signed)
        if: matrix.platform == 'macos' && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npm run build:installers -- --platform ${{ matrix.platform }} --ci

      - name: Build installers (macOS — unsigned)
        if: matrix.platform == 'macos' && env.HAS_APPLE_CERT != 'true'
        run: npm run build:installers -- --platform ${{ matrix.platform }} --ci

      - name: Build installers (Windows / Linux)
        if: matrix.platform != 'macos'
        run: npm run build:installers -- --platform ${{ matrix.platform }} --ci

      # ── Cleanup macOS secrets ──────────────────────────────────────────────
      - name: Cleanup secrets
        if: matrix.platform == 'macos' && env.HAS_APPLE_CERT == 'true' && always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/apikey.p8" \
                "$RUNNER_TEMP/certificate.p12" \
                "$RUNNER_TEMP/DeveloperIDG2CA.cer"

      # ── Upload artifacts ───────────────────────────────────────────────────
      - name: Upload installer artifacts
        uses: actions/upload-artifact@v7
        with:
          name: installers-${{ matrix.platform }}
          path: outputs/${{ matrix.platform }}/

  # ── Publish GitHub Release ─────────────────────────────────────────────────
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Generate latest.json
        id: manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          PUB_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          find_one() {
            local pat="$1"
            find artifacts/ -type f -name "$pat" | head -n1
          }

          MAC_TARBALL="$(find_one 'TokenMonitor*.app.tar.gz')"
          MAC_SIG="$(find_one 'TokenMonitor*.app.tar.gz.sig')"
          WIN_BUNDLE="$(find_one 'TokenMonitor*-setup.exe')"
          WIN_SIG="$(find_one 'TokenMonitor*-setup.exe.sig')"
          LINUX_APPIMAGE="$(find_one 'TokenMonitor*.AppImage')"
          LINUX_SIG="$(find_one 'TokenMonitor*.AppImage.sig')"

          missing=0
          for pair in "MAC_TARBALL:$MAC_TARBALL" "MAC_SIG:$MAC_SIG" \
                      "WIN_BUNDLE:$WIN_BUNDLE" "WIN_SIG:$WIN_SIG" \
                      "LINUX_APPIMAGE:$LINUX_APPIMAGE" "LINUX_SIG:$LINUX_SIG"; do
            name="${pair%%:*}"
            file="${pair#*:}"
            if [ -z "$file" ] || [ ! -f "$file" ]; then
              echo "::warning::Missing updater artifact for $name (this platform will not auto-update)"
              missing=$((missing+1))
            fi
          done

          if [ "$missing" -eq 6 ]; then
            echo "::error::No updater artifacts found — updater signing may be disabled."
            exit 1
          fi

          base="https://github.com/Michael-OvO/TokenMonitor/releases/download/${TAG}"

          read_sig() {
            if [ -n "$1" ] && [ -f "$1" ]; then cat "$1"; else echo ""; fi
          }

          MAC_SIG_VAL="$(read_sig "$MAC_SIG")"
          WIN_SIG_VAL="$(read_sig "$WIN_SIG")"
          LINUX_SIG_VAL="$(read_sig "$LINUX_SIG")"

          MAC_URL=""; WIN_URL=""; LINUX_URL=""
          [ -n "$MAC_TARBALL" ] && MAC_URL="${base}/$(basename "$MAC_TARBALL")"
          [ -n "$WIN_BUNDLE" ] && WIN_URL="${base}/$(basename "$WIN_BUNDLE")"
          [ -n "$LINUX_APPIMAGE" ] && LINUX_URL="${base}/$(basename "$LINUX_APPIMAGE")"

          # Release notes: pull from GH release body if present; else fallback.
          notes="Release ${VERSION}"
          if body=$(gh release view "$TAG" --json body --jq .body 2>/dev/null); then
            [ -n "$body" ] && notes="$body"
          fi

          # Build platforms object, including only platforms with both url + sig.
          platforms_json="{}"
          add_platform() {
            local key="$1"
            local url="$2"
            local sig="$3"
            if [ -n "$url" ] && [ -n "$sig" ]; then
              platforms_json=$(echo "$platforms_json" | jq \
                --arg k "$key" --arg u "$url" --arg s "$sig" \
                '. + {($k): {signature: $s, url: $u}}')
            fi
          }
          add_platform "darwin-aarch64" "$MAC_URL" "$MAC_SIG_VAL"
          add_platform "windows-x86_64" "$WIN_URL" "$WIN_SIG_VAL"
          add_platform "linux-x86_64"   "$LINUX_URL" "$LINUX_SIG_VAL"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "$notes" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$platforms_json" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > latest.json

          cat latest.json

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            artifacts/installers-macos/*
            artifacts/installers-windows/*
            artifacts/installers-linux/*
            latest.json
