ecl_version: "1.0"
feature: "cache-warmup"
status: phase-10-implementation
created: 2026-05-21
updated: 2026-05-21

prompt_calibration:
  raw_input: |
    1. 在后台自动预热所有内容，从当前provider * period开始然后再调整前后。
    2. 在settings里面有个全量缓存的按钮，按下之后在后台开始缓存，有进度条说明还有多少。
    3. 冷启动先读上次缓存，后台逐步预热剩余。
    预热所有历史。offset 0 和 offset -1 的可以按照provider并行处理。
  tracks:
    - track_id: T1
      name: "Background cache warmup system"
      priority: 1

requirements:
  - id: REQ-001
    text: "App startup auto-warms all provider×period×offset combinations silently"
    status: verified
  - id: REQ-002
    text: "Settings UI button triggers full warmup with real-time progress bar"
    status: verified
  - id: REQ-003
    text: "Cold start reads disk cache instantly; background replaces with fresh data"
    status: verified
  - id: REQ-004
    text: "All historical offsets are warmed (not just 0/-1)"
    status: verified
  - id: REQ-005
    text: "Different providers at same offset level run in parallel"
    status: verified

decisions:
  - id: DEC-001
    text: "Use static AtomicBool for mutual exclusion (auto vs manual warmup)"
  - id: DEC-002
    text: "Phase 1 (offset=0): parallel across providers, serial within same provider"
  - id: DEC-003
    text: "Phase 2 (historical): serial to control memory pressure"
  - id: DEC-004
    text: "PayloadDiskCache::save gains content-hash skip to avoid redundant writes"
  - id: DEC-005
    text: "Events: cache://progress (per-key) and cache://done (completion)"

dependency_graph:
  cache_warmup.rs: []
  payload_disk_cache.rs: []
  mod.rs: [cache_warmup.rs]
  commands.rs: [cache_warmup.rs]
  lib.rs: [commands.rs, cache_warmup.rs]
  CacheWarmupSettings.svelte: [lib.rs]
  Settings.svelte: [CacheWarmupSettings.svelte]
