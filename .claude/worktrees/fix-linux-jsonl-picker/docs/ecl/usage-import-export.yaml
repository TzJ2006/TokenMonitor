ecl_version: "1.0"
feature: "usage-import-export"
status: completed
created: 2026-06-02
updated: 2026-06-15

prompt_calibration:
  raw_input: "增加一个新功能，支持导入和导出AI用量。注意，在导入的时候，要注意去重。"
  intent_decomposition:
    total_intents: 2
    total_tracks: 1
    tracks:
      - track_id: T1
        name: "Usage import/export with dedup"
        priority: 1
        intents:
          - raw: "导出 AI 用量到可移植文件"
            type: feature
          - raw: "导入 AI 用量并去重（不重复统计）"
            type: feature
  tracks:
    T1:
      calibrated_scenario: |
        让用户把本地 + 远程归档的 token 用量导出成单个可移植 JSON 文件
        （用于备份 / 迁移到新机器），并能在另一台机器或重装后导入合并。
        导入必须幂等去重：重复导入同一文件不得造成重复统计。
      intent_dimensions:
        task: { status: present, value: "Export archive to JSON; import + merge with dedup" }
        input: { status: enriched, value: "ArchivedHourly records from usage-archive/ (local claude/codex/cursor + devices)" }
        output: { status: enriched, value: "Portable versioned JSON file; merged archive on import" }
        constraints: { status: validated, value: "Idempotent import (no double counting); preserve frontier invariant" }
        context: { status: enriched, value: "Builds on usage-data-archive; no new Tauri plugins" }
        success_criteria: { status: resolved, value: "Re-import = no-op; fresh-machine import surfaces data in UI" }

decisions:
  - id: DEC-001
    date: 2026-06-02
    decision: "Export/import operate on the ArchivedHourly aggregate layer, not raw JSONL"
    rationale: |
      The archive (usage-archive/) is already the durable, provider-agnostic,
      cost-free record with a documented compact schema. Exporting raw provider
      JSONL would be lossy/format-coupled and would re-introduce per-provider
      parsing on import. Aggregates round-trip losslessly via existing serde.
  - id: DEC-002
    date: 2026-06-02
    decision: "Dedup = field-wise MAX merge keyed by (source_key, d, h, mk, p)"
    rationale: |
      The bucket (source, date, hour, model_key, provider) is the natural identity
      of an archived aggregate. Field-wise max makes import IDEMPOTENT: re-importing
      the same export changes nothing (max(x,x)=x); importing a partial-hour backup
      onto a machine that accumulated more keeps the larger (no loss, no double).
      SUM was rejected: it would double-count on re-import, violating "去重".
  - id: DEC-003
    date: 2026-06-02
    decision: "Import via HTML <input type=file>; Export via native Save dialog (tauri-plugin-dialog)"
    rationale: |
      Import uses an HTML <input type=file> + File.text() (native picker in webview,
      reliable on all 3 platforms; no plugin needed). Export originally wrote to the
      OS download dir, but the user wants a native chooser to pick the destination,
      so tauri-plugin-dialog was added: the frontend calls save({defaultPath,filters})
      to get a path (null = cancelled) and Rust writes the JSON there. Capability:
      "dialog:allow-save". Note: revealItemInDir was dropped (it was never granted in
      capabilities and is redundant once the user picks the location).
  - id: DEC-004
    date: 2026-06-02
    decision: "Import advances each source frontier to max completed imported hour"
    rationale: |
      load_entries only reads the archive when a frontier exists and only for hours
      <= frontier (live owns hours after). Imported historical hours are invisible
      unless the frontier covers them. Advancing to the max COMPLETED (strictly
      before current local hour) imported hour surfaces them without freezing the
      live current hour. Local completed hours are flushed to the archive first
      (reusing archive_local_usage) so advancing never hides un-archived live data.

  - id: DEC-005
    date: 2026-06-15
    decision: "Background auto-export writes an append-only JSONL log; manual export stays a JSON snapshot; import reads BOTH"
    rationale: |
      A user-toggleable auto-export mirrors the archive to a chosen folder on the
      refresh cadence. The data model is append-only (completed hours are immutable
      and only grow), so a JSONL log that APPENDS new buckets fits far better than
      rewriting a whole JSON snapshot every tick (I/O scales with new data, not
      total history). The manual Export button keeps the single-document JSON
      snapshot (human-readable, one file). import_usage_data transparently detects
      and reads both shapes (header probe by `format` value, with a headerless
      record fallback; BOM-stripped; a corrupt/oversized line is skipped+counted,
      not fatal). Correctness mechanisms:
        - Once-per-session full reconciliation guarded by AutoExportRuntime.synced
          (atomic temp+rename) guarantees completeness after launch / folder change
          / import / a missing file; thereafter only records past a per-source
          frontier cursor are appended.
        - synced=false + cursors.clear() is the LAST mutation in import / folder
          change, and import runs run_auto_export synchronously so the mirror
          reflects a field-wise-max bump of an OLD (behind-cursor) bucket even when
          refresh is Off.
        - Appends carry a leading-newline guard so a torn previous write becomes its
          own skippable line instead of fusing with the next record.
      Both export shapes are human-report-oriented (DEC-006): each record DROPS the
      raw archive `p` tag and instead carries a resolved `provider` (always
      claude/codex/cursor, never "all") plus a computed USD `cost`. JSONL keeps
      `device`+`provider` at the line level; the snapshot puts `provider` on each
      record. `cost` = calculate_cost_for_key * provider_multiplier (USD, rounded
      to micro-dollars; 0 when pricing unknown). `provider` resolution: local rows
      use record.p (Cursor proxies many model families, so its tag wins over the
      model); device rows (p="all") recover the tool from the model family via
      detect_model_family (OpenAI→codex, Cursor→cursor, else→claude).
      On IMPORT the bucket `p` is reconstructed — legacy record.p > new
      record.provider > JSONL line provider > "all" — and `cost` is ignored (the
      archive recomputes cost with live pricing). Old files that still carry `p`
      import byte-faithfully; new device rows re-import as their resolved provider
      (claude/codex) rather than "all" (see ATK-004 for the live-sync-vs-import
      double-count caveat). Device name is derived with no new crate
      (scutil ComputerName on macOS, COMPUTERNAME on Windows, `hostname` elsewhere)
      and cached. Import ignores device/provider (dedup still keys off source_key +
      (d,h,mk,p)); they exist for human/cross-machine traceability of the synced log.
      Capability added: "dialog:allow-open" (directory picker for the folder).
  - id: DEC-006
    date: 2026-06-15
    decision: "Export records are report-oriented: drop the raw `p` tag, add resolved `provider` + USD `cost`; import reconstructs `p` and ignores `cost`"
    rationale: |
      The exported files are primarily read by humans / external tooling, so a
      raw `p="all"` device tag and an absent cost were unhelpful. Both shapes now
      emit `provider` (claude/codex/cursor, never "all") and a computed USD `cost`.
      This deliberately *narrows* DEC-001 (which keeps the ARCHIVE cost-free): the
      archive still stores only tokens and recomputes cost with live pricing — the
      stored `cost` is an export-time snapshot, informational only, and is IGNORED
      on import. `p` is no longer written, so import reconstructs the dedup key's
      `p` from (legacy record.p > new record.provider > JSONL line provider >
      "all"); this keeps old files byte-faithful but means a device's rows
      re-import under their resolved provider instead of "all" (acceptable per
      ATK-004 — file import across active machines is not the recommended path;
      SSH device sync is). The user accepted these trade-offs (cost = USD snapshot;
      import retags device rows) when choosing to apply the change to both formats.

  - id: DEC-007
    date: 2026-06-15
    decision: "Cross-machine sync = state-based CRDT over per-device files (write own, read peers); surface file-imported peers as devices"
    rationale: |
      Users sync the auto-export folder with OneDrive/Dropbox. A single shared
      file written by N machines triggers the cloud's last-writer-wins +
      "conflicted copy" behavior (no merge for .jsonl). The fix is the standard
      local-first pattern (tonsky "Local-first, forever"; Super Productivity #4857;
      sqlite-sync): ONE file per device (single writer → never conflicts), each
      machine reads peers' files and merges. Our archive's field-wise-max dedup is
      already a state-based CRDT (completed-hour buckets are immutable → a grow-only
      set; join = max), so merges converge with zero coordination.
      Mechanics: each tick run_auto_export (a) merges every OTHER
      TokenMonitor-Usage-*.jsonl in the folder (mtime-gated), remapping a peer's
      local:* to device:<peerSlug> (so totals SUM, not collapse via max — the
      ATK-004 trap) and keeping device:* as-is (idempotent if shared); (b) writes
      THIS machine's file containing only OWNED sources (local:* + our SSH hosts),
      never re-exporting an imported peer. To make merged peers visible,
      device_aggregation enumerates configured SSH hosts ∪ archive device sources
      (a disabled host stays hidden; archive-only peers read archived data, skip the
      SSH cache, default include_in_stats=true). A device that is both an SSH host
      and present in a peer file is enumerated once (configured wins) so the ALL
      total never double-counts. Same-computer-name machines would collide on the
      slug (shared filename) — a documented edge to disambiguate later.

requirements:
  - id: REQ-001
    text: "Export produces a single versioned JSON file containing all archived sources"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "File has format='tokenmonitor-usage-export', format_version, exported_at, app_version"
      - "One block per source (local:claude, local:codex, local:cursor, device:*) with raw ArchivedHourly records"
      - "File written to OS download dir; path returned and revealed in file manager"

  - id: REQ-002
    text: "Import merges records into the archive with idempotent dedup"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "Records keyed by (source, d, h, mk, p); collisions resolved by field-wise max"
      - "Re-importing the same file is a no-op (asserted by unit test)"
      - "Source dirs rewritten atomically (temp+rename); existing duplicate lines collapsed"
      - "Unknown/invalid source_key rejected (no path traversal)"

  - id: REQ-003
    text: "Imported historical data is visible in the UI without restart"
    status: verified
    confidence: 0.9
    acceptance_criteria:
      - "Frontier advanced to max completed imported hour per source"
      - "Local completed hours flushed before merge (no live data hidden)"
      - "Caches invalidated: parser payload+entries AND no-TTL disk payload cache"
      - "data-updated emitted so stores refetch"

  - id: REQ-005
    text: "Background auto-export incrementally appends the archive to a user-chosen folder on the refresh cadence"
    status: verified
    confidence: 0.9
    acceptance_criteria:
      - "Settings row (after Cache) with a folder picker + toggle; folder/enabled persisted and re-pushed on launch"
      - "Writes ONE file PER DEVICE: <folder>/TokenMonitor-Usage-<deviceSlug>.jsonl (single writer → cloud-sync folders never produce a conflicted copy). Slug is filename- AND source-key-safe so peers can remap to device:<slug>."
      - "First enabled tick this session does a full rewrite (atomic temp+rename); later ticks append only records past each source frontier cursor"
      - "Runs on the refresh tick AND the refresh=Off idle branch; import resets synced and runs it synchronously"
      - "import_usage_data reads both the JSON snapshot and the JSONL log; corrupt/oversized lines skipped and counted (ImportResult.skipped)"

  - id: REQ-004
    text: "Updater Install prompt occupies a row inside the Updates card under Last Checked"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "When an update is available, a row below Last Checked shows Install (or Download) + Cancel"
      - "Row reflects installing/progress/error states; occupies layout space (not an overlay)"
      - "Redundant .update-bottom banner removed from Settings; App top banner unchanged"

feature_guard:
  generated: "2026-06-02"
  guards:
    - id: GUARD-001
      feature: "Usage import/export with dedup"
      description: "Export archive to portable JSON; import + merge with idempotent dedup"
      key_files:
        - "src-tauri/src/usage/archive.rs"
        - "src-tauri/src/commands/usage_io.rs"
        - "src-tauri/src/commands/config.rs"
        - "src-tauri/src/lib.rs"
        - "src-tauri/capabilities/default.json"
        - "src/lib/components/Settings.svelte"
        - "src/lib/stores/usageIo.ts"
      invariants:
        - "Import dedup is field-wise MAX keyed by (source_key, d, h, mk, p) — idempotent"
        - "import_source rewrites monthly JSONL atomically (temp+rename)"
        - "Imported source_key is validated against ^(local:(claude|codex|cursor)|device:[A-Za-z0-9._-]+)$"
        - "Import advances frontier only to COMPLETED (strictly before current local hour) imported hours"
        - "After import: parser.clear_payload_cache() AND AppState::clear_payload_disk_cache() are both called (see payload-disk-cache INV-006)"
        - "Export/import never call ArchiveManager::reset() or parser.clear_cache() (would delete the archive)"
        - "Auto-export: manual Export = JSON snapshot; auto-export = JSONL log; import reads BOTH (single import loop behind is_valid_source_key)"
        - "run_auto_export does its blocking flush before taking auto_export_runtime; the lock is never held across an .await"
        - "Auto-export full rewrite is atomic (temp+rename); incremental appends use a leading-newline guard"
        - "synced=false + cursors.clear() is the LAST mutation on import / folder change; import runs run_auto_export synchronously"
        - "Each line carries device (computer name + OS for local:*, SSH alias for device:*) and provider (claude/codex/cursor, never 'all'; device rows resolved via model family)"
        - "Export records DROP `p` and add USD `cost`; import reconstructs p (legacy p > record.provider > JSONL line provider > 'all') and ignores cost; old files with `p` still import"
        - "Cross-machine: one file per device (TokenMonitor-Usage-<slug>.jsonl); slug = sanitized name + stable hash of (label+home) so two machines never collide on a file/alias"
        - "run_auto_export merges only OTHER devices' files (mtime-gated; mtime=None ⇒ always re-merge); owned-export filter = local:* + ALL configured SSH hosts incl DISABLED (the file is a backup; disabled = hidden in UI, NOT dropped from backup). Only file-imported PEER devices (never in our SSH config) are excluded from our export."
        - "device_aggregation enumerates enabled SSH hosts ∪ archive device sources (configured wins; disabled suppressed); archive read for every device independent of the SSH cache manager; a device that is both SSH-host and archive-present is counted once"
        - "incremental auto-export prunes rt.cursors to currently-owned sources"
      verification:
        # On Windows hosts scope to --lib to avoid the bin-target manifest
        # conflict (CVT1100) with TM_EMBED_TEST_MANIFEST=1.
        command: "cd src-tauri && cargo test archive::tests"
        expected: "all archive tests pass (incl. import idempotency + roundtrip)"
      status: active

dedup_strategy: |
  Two complementary mechanisms (see [[usage-archive]] and DEC-002):
  - Within-source identity: (date, hour, model_key, provider). Two records with
    the same identity are the same bucket.
  - Merge rule on collision: field-wise MAX of token counts. Idempotent — the
    defining property the user asked for ("注意去重"). Re-import is a no-op.
  - Frontier (time-boundary) still governs archive-vs-live disjointness at query
    time; import advances it conservatively to completed hours only.

confrontation:
  red_team:
    - id: ATK-001
      scenario: "Re-importing the same export double counts usage"
      severity: high
    - id: ATK-002
      scenario: "Importing advances frontier over the live current hour and freezes it"
      severity: high
    - id: ATK-003
      scenario: "Malicious source_key (e.g. ../../) escapes the archive dir on rewrite"
      severity: high
    - id: ATK-004
      scenario: "Two different active machines share source 'local:claude' for the same hour"
      severity: medium
    - id: ATK-005
      scenario: "App crashes mid-rewrite leaving a partial monthly JSONL"
      severity: medium
    - id: ATK-006
      scenario: "Imported data not reflected in UI because caches stayed warm"
      severity: medium
    - id: ATK-007
      scenario: "App crashes mid-append leaving a torn JSONL line that corrupts the next record on re-append, or aborts import"
      severity: medium
    - id: ATK-008
      scenario: "A JSONL log is misdetected as the JSON snapshot (or vice-versa), or a headerless/BOM-prefixed file fails to import"
      severity: low
  blue_team:
    - attack: ATK-001
      verdict: defended
      mitigation: "Field-wise max merge keyed by bucket identity → idempotent. Unit test asserts re-import is a no-op."
    - attack: ATK-002
      verdict: mitigated
      mitigation: "Frontier advanced only to hours strictly before the current local hour; current hour never covered, live keeps updating."
    - attack: ATK-003
      verdict: defended
      mitigation: "source_key validated by regex before any filesystem op; only local:claude|local:codex|device:<safe> accepted."
    - attack: ATK-004
      verdict: accepted
      mitigation: |
        Aggregate-level merge cannot distinguish same-bucket activity from two
        machines; max under-counts rather than double-counts (safer, matches dedup
        intent). Recommended path for combining two ACTIVE machines is SSH device
        sync (device:* sources), not file import. Documented limitation."
    - attack: ATK-005
      verdict: mitigated
      mitigation: "Per-month atomic write (temp file + rename); a crash leaves the previous file intact."
    - attack: ATK-006
      verdict: defended
      mitigation: "Import clears parser payload+entries cache and the no-TTL disk payload cache, then emits data-updated."
    - attack: ATK-007
      verdict: mitigated
      mitigation: |
        Append carries a leading-newline guard (reads the file's last byte; emits a
        separator '\n' if missing) so a torn line becomes its own line. The launch-time
        synced=false forces an atomic temp+rename full rewrite that overwrites any
        torn file. Import skips and counts an unparseable line (ImportResult.skipped)
        instead of aborting.
    - attack: ATK-008
      verdict: defended
      mitigation: |
        Detection keys on the `format` VALUE of the first line (header probe), with a
        headerless {source_key, record} fallback; a leading UTF-8 BOM is stripped; an
        empty/whitespace-only file returns an empty result. Unit tests cover snapshot,
        header JSONL, headerless JSONL, BOM, empty, oversized line, and torn-tail."

risk_register:
  - risk: "Large archives produce a large export file"
    severity: low
    mitigation: "~100 bytes/record, hourly granularity. Years of data = single-digit MB."
  - risk: "Export omits the current incomplete hour"
    severity: low
    mitigation: "By design — archive holds completed hours only; the current hour is transient live data."

implementation_order:
  - step: 1
    description: "archive.rs: ArchivedHourly::merge_max_from, ImportSourceStats, list_sources, read_raw, import_source, advance_frontier, atomic jsonl rewrite + tests"
  - step: 2
    description: "commands/usage_io.rs: export_usage_data + import_usage_data; register in lib.rs; archive_local_usage -> pub(crate)"
  - step: 3
    description: "Frontend: stores/usageIo.ts + Settings.svelte Import/Export buttons"
  - step: 4
    description: "Updater in-card Install/Cancel row (REQ-004)"
