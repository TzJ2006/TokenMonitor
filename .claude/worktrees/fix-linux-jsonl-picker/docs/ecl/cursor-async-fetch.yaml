ecl_version: "1.0"
feature: "cursor-async-fetch"
status: implemented
created: 2026-05-22
updated: 2026-05-22

prompt_calibration:
  raw_input: "把Cursor API修改成异步处理"
  intent_decomposition:
    total_intents: 1
    total_tracks: 1
    tracks:
      - track_id: T1
        name: "Cursor remote API async decoupling"
        priority: 1
        intents:
          - raw: "把Cursor API修改成异步处理"
            type: feature
  tracks:
    T1:
      calibrated_scenario: |
        Decouple Cursor remote API fetch from the synchronous usage parsing pipeline.
        On cold start, return Claude+Codex data immediately (~1.3s). Cursor remote
        data is fetched in a background tokio task; on completion, a Tauri event
        notifies the frontend to merge the data. Frontend shows a loading state
        for Cursor tab until data arrives.
      intent_dimensions:
        task: { status: present, value: "Async Cursor remote fetch" }
        input: { status: present, value: "Cursor API credentials + time range" }
        output: { status: present, value: "ParsedEntry vec, delivered via event" }
        constraints: { status: enriched, value: "Local cursor file parsing stays sync; rate_limits/cursor.rs already async - no change needed" }
        context: { status: enriched, value: "Profiling: Cursor API = 77-87% of cold start (8.4s/10.9s)" }
        success_criteria: { status: resolved, value: "Cold start shows Claude+Codex in <2s; Cursor data appears async within 10s" }

requirements:
  - id: REQ-001
    text: "Usage data IPC returns immediately without waiting for Cursor remote API"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "get_usage_data returns Claude+Codex data within 2s on cold start"
      - "Cursor entries field is empty/null in initial response when remote fetch is pending"
    decomposition:
      features: [FEAT-001]

  - id: REQ-002
    text: "Cursor remote data is fetched in background and delivered via Tauri event"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "A tokio::spawn task fetches cursor remote entries after initial response"
      - "On completion, emits a Tauri event with cursor usage entries"
      - "Frontend receives event and merges data into existing payload"
    decomposition:
      features: [FEAT-002, FEAT-003]

  - id: REQ-003
    text: "Frontend shows loading state for Cursor tab until async data arrives"
    status: verified
    confidence: 0.9
    acceptance_criteria:
      - "Cursor tab displays spinner/skeleton while data is pending"
      - "All tab chart excludes cursor data until it arrives, then re-renders"
      - "Loading state clears when event is received or on error"
    decomposition:
      features: [FEAT-004]

  - id: REQ-004
    text: "Local cursor file parsing remains in sync pipeline (it is fast)"
    status: verified
    confidence: 1.0
    acceptance_criteria:
      - "parse_cursor_session_file and load_cursor_local_entries stay synchronous"
      - "Only fetch_cursor_remote_entries is deferred to background"
    decomposition:
      features: [FEAT-001]

features:
  - id: FEAT-001
    name: "Split cursor remote fetch out of sync pipeline"
    parent: REQ-001
    modules: [MOD-001]
    dependencies: []
    complexity: medium

  - id: FEAT-002
    name: "Background task + Tauri event emission"
    parent: REQ-002
    modules: [MOD-002]
    dependencies: [FEAT-001]
    complexity: medium

  - id: FEAT-003
    name: "Frontend event listener + payload merge"
    parent: REQ-002
    modules: [MOD-003]
    dependencies: [FEAT-002]
    complexity: medium

  - id: FEAT-004
    name: "Cursor loading UI state"
    parent: REQ-003
    modules: [MOD-004]
    dependencies: [FEAT-003]
    complexity: small

modules:
  - id: MOD-001
    name: "parser.rs: skip cursor remote in load_cursor_entries_with_debug"
    parent: FEAT-001
    file_path: "src-tauri/src/usage/parser.rs"
    description: |
      When local entries are empty, instead of calling fetch_cursor_remote_entries
      synchronously, return empty entries + a flag indicating "remote fetch needed".
      The caller (usage_query.rs) uses this flag to spawn background task.

  - id: MOD-002
    name: "usage_query.rs: spawn background cursor fetch + emit event"
    parent: FEAT-002
    file_path: "src-tauri/src/commands/usage_query.rs"
    description: |
      After building partial payload (without cursor remote), if cursor remote
      is needed, spawn a tokio task that:
      1. Calls fetch_cursor_remote_entries
      2. Builds cursor portion of UsagePayload
      3. Emits 'cursor-usage-ready' Tauri event with the data

  - id: MOD-003
    name: "Frontend: listen for cursor-usage-ready event"
    parent: FEAT-003
    file_path: "src/lib/stores/usage.ts"
    description: |
      Register a Tauri event listener for 'cursor-usage-ready'.
      On receive, merge cursor data into the existing usage store state.

  - id: MOD-004
    name: "Frontend: Cursor loading indicator"
    parent: FEAT-004
    file_path: "src/lib/components/DevicesView.svelte"
    description: |
      Show loading skeleton when cursor data is pending.
      Clear on event receive or error timeout.

dependency_graph:
  FEAT-001: []
  FEAT-002: [FEAT-001]
  FEAT-003: [FEAT-002]
  FEAT-004: [FEAT-003]

decisions:
  - id: DEC-001
    date: 2026-05-22
    decision: "先返回再追加 pattern (return-then-append)"
    rationale: "User selected. Eliminates 8.4s wait for primary data display."
  - id: DEC-002
    date: 2026-05-22
    decision: "Cursor tab shows loading spinner until async data arrives"
    rationale: "User preference. Clear visual feedback that data is pending."
